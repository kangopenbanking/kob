        - WooCommerce
      summary: WooCommerce payment webhook
      description: Receives payment status updates and updates the corresponding WooCommerce order.
      operationId: woocommercePaymentWebhook
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - event_type
                - transaction_ref
                - status
              properties:
                event_type:
                  type: string
                  enum:
                    - payment.completed
                    - payment.failed
                    - payment.cancelled
                    - payment.refunded
                transaction_ref:
                  type: string
                woocommerce_order_id:
                  type: integer
                status:
                  type: string
                  enum:
                    - completed
                    - successful
                    - failed
                    - cancelled
                    - refunded
                amount:
                  type: string
                  pattern: ^[0-9]{1,15}$
                  description: >-
                    Represented as a string integer in the currency's minor unit (XAF has no subunits). Must be
                    consistent with the currency field.
                currency:
                  type: string
                  enum:
                    - XAF
                    - XOF
                    - USD
                    - EUR
                    - GBP
                    - CNY
                    - NGN
                    - GHS
                    - KES
                    - ZAR
                  default: XAF
                  description: ISO 4217 currency code. Default is XAF (Central African CFA Franc).
