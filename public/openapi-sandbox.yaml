  /v1/sandbox/payout-sim:
    post:
      tags:
        - Sandbox
      summary: Simulate payout scenario
      description: >-
        Run a payout through a pre-seeded sandbox scenario (e.g. insufficient_funds, network_timeout,
        reversed_after_success).
      operationId: sandboxPayoutSim
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: >-
            Required on all POST/PUT endpoints. Unique key for idempotent request processing (UUID v4 recommended). Keys
            expire after 24 hours.
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/Tracestate'
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - scenario
                - amount
                - currency
              properties:
                scenario:
                  type: string
                  enum:
                    - instant_success
                    - delayed_success
                    - insufficient_funds
                    - network_timeout
                    - compliance_hold
                    - reversed_after_success
                    - partial_failure
                amount:
                  type: string
                  pattern: ^[0-9]{1,15}$
                  description: >-
                    Represented as a string integer in the currency's minor unit (XAF has no subunits). Must be
                    consistent with the currency field.
                currency:
                  type: string
                  enum:
                    - XAF
                    - XOF
                    - USD
                    - EUR
                    - GBP
                    - CNY
                    - NGN
                    - GHS
                    - KES
                    - ZAR
                  default: XAF
                  description: ISO 4217 currency code. Default is XAF (Central African CFA Franc).
                merchant_id:
                  type: string
                  format: uuid
                webhook_url:
                  type: string
                  format: uri
      responses:
        '200':
          description: Simulation result with timeline and webhook callbacks
          content:
            application/json:
              schema:
                type: object
                properties:
                  scenario:
                    type: string
                  payout:
                    $ref: '#/components/schemas/GatewayPayout'
