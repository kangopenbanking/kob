  /v1/gateway/fund-account:
    post:
      tags:
        - Payment Gateway
      summary: Fund a KOB account
      description: >-
        Add funds to a user's KOB account via Mobile Money, Card, or Bank Transfer. On successful provider charge, the
        account balance is automatically credited.
      operationId: gatewayFundAccount
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: >-
            Required on all POST/PUT endpoints. Unique key for idempotent request processing (UUID v4 recommended). Keys
            expire after 24 hours.
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/Tracestate'
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
                - channel
                - account_id
              properties:
                amount:
                  type: string
                  example: '50000'
                  pattern: ^[0-9]{1,15}$
                  description: >-
                    Represented as a string integer in the currency's minor unit (XAF has no subunits). Must be
                    consistent with the currency field.
                currency:
                  type: string
                  default: XAF
                  enum:
                    - XAF
                    - XOF
                    - USD
                    - EUR
                    - GBP
                    - CNY
                    - NGN
                    - GHS
                    - KES
                    - ZAR
                  description: ISO 4217 currency code. Default is XAF (Central African CFA Franc).
                channel:
                  type: string
                  enum:
                    - mobile_money
                    - card
                    - bank_transfer
                account_id:
                  type: string
                  format: uuid
                  description: Target KOB account to credit
                source_phone:
                  type: string
                  description: Required for mobile_money
                source_email:
                  type: string
                  description: Required for card
                metadata:
                  type: object
