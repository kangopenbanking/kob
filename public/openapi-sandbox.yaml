  /v1/webhooks/providers/paypal:
    post:
      tags:
        - Provider Webhooks (Inbound)
      summary: PayPal inbound webhook
      description: >-
        Receives PayPal webhook events for payment captures, checkout approvals, and payout status updates.


        **Signature Verification (Certificate-Based)**


        KOB verifies PayPal webhooks using PayPal's `POST /v1/notifications/verify-webhook-signature` API — not local
        cert validation. The flow:


        1. Extract the 5 `paypal-*` headers from the incoming request

        2. POST them along with the raw event body and the configured `PAYPAL_WEBHOOK_ID` to PayPal's verification
        endpoint

        3. If PayPal returns `verification_status: "SUCCESS"`, the event is accepted; otherwise rejected with `401`


        **Deduplication**: Events are keyed by `paypal_{event.id}` in the `webhook_inbox` table. Duplicates return `200
        {status: "already_processed"}`.


        **Handled Event Types**:

        - `PAYMENT.CAPTURE.COMPLETED` → funding intent succeeded, triggers ledger credit

        - `CHECKOUT.ORDER.APPROVED` → auto-captures PayPal order

        - `PAYOUTS-ITEM.*` → payout status sync (succeeded/failed/reversed) Return HTTP 400 for malformed payloads to
        prevent infinite provider retry loops. Return HTTP 200 for all valid but unhandled event types. **Signature
        Verification:** All inbound PayPal webhooks MUST be verified using the PayPal Webhook Signature Verification API
        (POST /v1/notifications/verify-webhook-signature). Required headers: PAYPAL-TRANSMISSION-ID,
        PAYPAL-TRANSMISSION-TIME, PAYPAL-TRANSMISSION-SIG, PAYPAL-CERT-URL, PAYPAL-AUTH-ALGO. The server must validate
        the transmission signature against the webhook ID before processing any event. Unverified payloads must be
        rejected with HTTP 401. See: https://developer.paypal.com/docs/api/webhooks/v1/#verify-webhook-signature_post


        **PayPal Webhook Request Headers (present on every delivery):**


        | Header | Description |

        |--------|-------------|

        | `PayPal-Transmission-Id` | Unique identifier for this webhook transmission. Use for deduplication. |

        | `PayPal-Transmission-Time` | ISO 8601 timestamp when PayPal transmitted the event. |

        | `PayPal-Cert-Url` | HTTPS URL of the PayPal X.509 public certificate used for signing. Cache with ETag. |

        | `PayPal-Auth-Algo` | Signing algorithm, typically `SHA256withRSA`. |

        | `PayPal-Transmission-Sig` | Base64-encoded RSA-SHA256 signature over the verification string. |


        **Manual Verification Algorithm (alternative to API-based verification):**

        1. Retrieve the certificate from `PayPal-Cert-Url` (validate it is a paypal.com domain)

        2. Construct the verification string:
        `{PayPal-Transmission-Id}|{PayPal-Transmission-Time}|{PAYPAL_WEBHOOK_ID}|{CRC32(raw_request_body)}`

        3. Verify `PayPal-Transmission-Sig` against the verification string using the certificate's public key and the
        algorithm in `PayPal-Auth-Algo`

        4. Reject any request where verification fails — return HTTP 400 to halt retries

        5. For SDK-based verification, use PayPal's Node.js/Java/PHP SDKs which handle the above automatically
      operationId: receivePaypalWebhook
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  example: WH-1234567890
                event_type:
                  type: string
                  example: PAYMENT.CAPTURE.COMPLETED
                resource:
                  type: object
      responses:
        '200':
          description: Webhook processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - processed
                      - already_processed
                  event_type:
                    type: string
          headers:
            x-fapi-interaction-id:
              $ref: '#/components/headers/XFapiInteractionIdResponse'
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
            X-Trace-Id:
              description: >-
                Distributed trace identifier for this request. Echoes the inbound X-Trace-Id or W3C traceparent when
                present; otherwise a server-generated UUID v4.
              schema:
                type: string
            traceparent:
              $ref: '#/components/headers/Traceparent'
            Content-Language:
              $ref: '#/components/headers/Content-Language'
        '400':
          description: Bad Request — malformed or unrecognised webhook payload. Provider should NOT retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          headers:
