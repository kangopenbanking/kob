    WebhookEventType:
      type: object
      description: >-
        Webhook event type with its payload structure. All webhook deliveries follow the WebhookEventPayload envelope
        with event-type-specific data.
      allOf:
        - $ref: '#/components/schemas/WebhookEventPayload'
      properties:
        event:
          type: string
          enum:
            - wildcard.*
            - charge.created
            - charge.captured
            - charge.voided
            - charge.failed
            - charge.cancelled
            - refund.created
            - refund.processed
            - refund.failed
            - payout.created
            - payout.processing
            - payout.completed
            - payout.failed
            - payment.initiated
            - payment.authorised
            - payment.submitted
            - payment.completed
            - payment.rejected
            - payment.cancelled
            - dispute.created
            - dispute.evidence_required
            - dispute.resolved
            - settlement.created
            - settlement.processed
            - consent.authorised
            - consent.revoked
            - consent.expired
            - loan.applied
            - loan.approved
            - loan.disbursed
            - loan.repaid
            - loan.defaulted
            - kyc.submitted
            - kyc.approved
            - kyc.rejected
            - mobile_money.charge_initiated
            - mobile_money.charge_completed
            - mobile_money.charge_failed
            - escrow.funded
            - escrow.released
            - escrow.refunded
            - virtual_account.credited
            - interbank.payment_submitted
            - interbank.payment_completed
            - interbank.payment_returned
            - pay_by_bank.intent_authorised
            - pay_by_bank.intent_rejected
            - pay_by_bank.payment_completed
            - subscription.created
            - subscription.renewed
            - subscription.cancelled
            - subscription.payment_failed
          description: The specific event type. Use 'wildcard.*' to subscribe to all events.
        data:
          type: object
          description: >-
            Event-specific payload. Key schemas by event: charge.* -> GatewayCharge, refund.* -> GatewayRefund, payout.*
            -> GatewayPayout, payment.* -> Payment, dispute.* -> GatewayDispute, settlement.* -> GatewaySettlement,
            consent.* -> Consent, loan.* -> LoanApplication, mobile_money.* -> MobileMoneyCharge, interbank.* ->
            InterbankPayment, pay_by_bank.* -> PayByBankIntent, subscription.* -> GatewaySubscription
          additionalProperties: true
    Webhook:
