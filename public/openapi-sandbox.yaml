  /v1/gateway/charges/preauth:
    post:
      tags:
        - Payment Gateway
      summary: Create preauthorized charge
      description: Hold funds on a card without immediately capturing. Uses Stripe PaymentIntent with capture_method=manual.
      operationId: gatewayPreauthCharge
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: >-
            Required on all POST/PUT endpoints. Unique key for idempotent request processing (UUID v4 recommended). Keys
            expire after 24 hours.
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/Tracestate'
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - merchant_id
                - amount
                - tx_ref
              properties:
                merchant_id:
                  type: string
                  format: uuid
                amount:
                  type: string
                  example: '50000'
                  pattern: ^[0-9]{1,15}$
                  description: >-
                    Represented as a string integer in the currency's minor unit (XAF has no subunits). Must be
                    consistent with the currency field.
                currency:
                  type: string
                  default: USD
                  enum:
                    - XAF
                    - XOF
                    - USD
                    - EUR
                    - GBP
                    - CNY
                    - NGN
                    - GHS
                    - KES
                    - ZAR
                  description: ISO 4217 currency code. Default is XAF (Central African CFA Franc).
                customer_email:
                  type: string
                customer_name:
                  type: string
                tx_ref:
                  type: string
                metadata:
                  type: object
      responses:
        '201':
          description: Preauthorized charge created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayCharge'
          headers:
            x-fapi-interaction-id:
              $ref: '#/components/headers/XFapiInteractionIdResponse'
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
            X-Trace-Id:
              description: >-
                Distributed trace identifier for this request. Echoes the inbound X-Trace-Id or W3C traceparent when
                present; otherwise a server-generated UUID v4.
              schema:
                type: string
            X-Idempotent-Replay:
              $ref: '#/components/headers/X-Idempotent-Replay'
            X-Idempotency-Status:
              $ref: '#/components/headers/X-Idempotency-Status'
            traceparent:
              $ref: '#/components/headers/Traceparent'
            Content-Language:
              $ref: '#/components/headers/Content-Language'
        '400':
          description: Bad request
          content:
