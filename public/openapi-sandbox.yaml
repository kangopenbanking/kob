  /v1/gateway/charges/token:
    post:
      tags:
        - Payment Gateway
      summary: Charge a saved token
      operationId: gatewayChargeToken
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: >-
            Required on all POST/PUT endpoints. Unique key for idempotent request processing (UUID v4 recommended). Keys
            expire after 24 hours.
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/Tracestate'
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token_id
                - amount
                - tx_ref
              properties:
                token_id:
                  type: string
                  format: uuid
                amount:
                  type: string
                  pattern: ^[0-9]{1,15}$
                  description: >-
                    Represented as a string integer in the currency's minor unit (XAF has no subunits). Must be
                    consistent with the currency field.
                currency:
                  type: string
                  default: XAF
                  enum:
                    - XAF
                    - XOF
                    - USD
                    - EUR
                    - GBP
                    - CNY
                    - NGN
                    - GHS
                    - KES
                    - ZAR
                  description: ISO 4217 currency code. Default is XAF (Central African CFA Franc).
                tx_ref:
                  type: string
                metadata:
                  type: object
      responses:
        '201':
          description: Token charge created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayCharge'
          headers:
