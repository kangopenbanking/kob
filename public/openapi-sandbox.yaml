  /v1/banking/facilitated-transfer:
    post:
      tags:
        - Banking Operations
      summary: Institution-facilitated bank transfer
      description: >-
        Initiate a bank payout facilitated by a financial institution through the Flutterwave rail. Includes KOB fee
        calculation and settlement tracking. The institution_id determines fee structure and settlement bucket.
      operationId: bankingFacilitatedTransfer
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: >-
            Required on all POST/PUT endpoints. Unique key for idempotent request processing (UUID v4 recommended). Keys
            expire after 24 hours.
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/Tracestate'
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - account_number
                - bank_code
                - amount
                - institution_id
              properties:
                account_number:
                  type: string
                  example: '1234567890'
                bank_code:
                  type: string
                  example: SGCM
                bank_name:
                  type: string
                  example: Société Générale Cameroun
                amount:
                  type: string
                  example: '100000'
                  pattern: ^[0-9]{1,15}$
                  description: >-
                    Represented as a string integer in the currency's minor unit (XAF has no subunits). Must be
                    consistent with the currency field.
                currency:
                  type: string
                  default: XAF
                  enum:
                    - XAF
                    - XOF
                    - USD
                    - EUR
                    - GBP
                    - CNY
                    - NGN
                    - GHS
                    - KES
                    - ZAR
                  description: ISO 4217 currency code. Default is XAF (Central African CFA Franc).
                narration:
                  type: string
                  example: Salary payment
                institution_id:
                  type: string
                  format: uuid
                  description: Facilitating institution
                account_name:
                  type: string
                  example: Jean Dupont
