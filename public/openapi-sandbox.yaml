  /v1/payouts/instant:
    post:
      tags:
        - Payment Gateway
      summary: Instant payout
      description: Route payout through fastest available rail (MoMo instant, bank express, Visa Direct).
      operationId: payoutInstant
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: >-
            Required on all POST/PUT endpoints. Unique key for idempotent request processing (UUID v4 recommended). Keys
            expire after 24 hours.
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/Tracestate'
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - merchant_id
                - amount
                - currency
                - channel
              properties:
                merchant_id:
                  type: string
                  format: uuid
                amount:
                  type: string
                  pattern: ^[0-9]{1,15}$
                  description: >-
                    Represented as a string integer in the currency's minor unit (XAF has no subunits). Must be
                    consistent with the currency field.
                currency:
                  type: string
                  enum:
                    - XAF
                    - XOF
                    - USD
                    - EUR
                    - GBP
                    - CNY
                    - NGN
                    - GHS
                    - KES
                    - ZAR
                  default: XAF
                  description: ISO 4217 currency code. Default is XAF (Central African CFA Franc).
                channel:
                  type: string
                  enum:
                    - momo_instant
                    - bank_express
                    - visa_direct
                beneficiary_phone:
                  type: string
                beneficiary_account:
                  type: string
                beneficiary_name:
                  type: string
      responses:
        '201':
          description: Instant payout initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayPayout'
          headers:
            x-fapi-interaction-id:
