    get:
      tags:
        - Platform
      summary: Published rate limits per tier
      description: >-
        Returns the canonical per-tier rate-limit numbers. Mirrors the values enforced by the gateway and surfaced via
        `X-RateLimit-Limit` / `X-RateLimit-Remaining` response headers.
      operationId: getRateLimits
      parameters:
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/Tracestate'
        - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          description: Tier table.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitTiers'
              example:
                data:
                  - tier: free
                    requests_per_minute: 60
                    burst: 120
                    concurrent_connections: 10
                    webhook_deliveries_per_minute: 30
                    idempotency_window_hours: 24
                  - tier: pro
                    requests_per_minute: 600
                    burst: 1200
                    concurrent_connections: 100
                    webhook_deliveries_per_minute: 300
                    idempotency_window_hours: 24
                  - tier: enterprise
                    requests_per_minute: 6000
                    burst: 12000
                    concurrent_connections: 1000
                    webhook_deliveries_per_minute: 3000
                    idempotency_window_hours: 168
          headers:
            traceparent:
              $ref: '#/components/headers/Traceparent'
            Content-Language:
              $ref: '#/components/headers/Content-Language'
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
