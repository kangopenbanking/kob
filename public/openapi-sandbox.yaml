  /v1/gateway/risk/score:
    post:
      tags:
        - Payment Gateway
      summary: Score transaction risk
      description: >-
        Run velocity, amount-threshold, and pattern-anomaly checks against a proposed transaction. Returns a 0–100 risk
        score, flags, and recommended action (allow | flag_for_review | block).
      operationId: gatewayRiskScore
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - merchant_id
                - amount
                - channel
              properties:
                merchant_id:
                  type: string
                  format: uuid
                amount:
                  type: string
                  example: '500000'
                  pattern: ^[0-9]{1,15}$
                  description: >-
                    Represented as a string integer in the currency's minor unit (XAF has no subunits). Must be
                    consistent with the currency field.
                currency:
                  type: string
                  default: XAF
                  enum:
                    - XAF
                    - XOF
                    - USD
                    - EUR
                    - GBP
                    - CNY
                    - NGN
                    - GHS
                    - KES
                    - ZAR
                  description: ISO 4217 currency code. Default is XAF (Central African CFA Franc).
                channel:
                  type: string
                  enum:
                    - mobile_money
                    - card
                    - bank_transfer
                    - ussd
                customer_email:
                  type: string
                customer_phone:
                  type: string
                customer_ip:
                  type: string
                metadata:
                  type: object
      responses:
        '200':
          description: Risk assessment result
          content:
            application/json:
              schema:
                type: object
                properties:
                  risk_score:
                    type: integer
                    minimum: 0
                    maximum: 100
                    example: 35
                  risk_level:
                    type: string
                    enum:
                      - low
                      - medium
                      - high
                      - critical
                  flags:
                    type: array
                    items:
                      type: string
                    example:
                      - high_amount
                  recommended_action:
                    type: string
                    enum:
                      - allow
                      - flag_for_review
                      - block
                  checks:
                    type: object
                    properties:
                      velocity:
                        type: object
                        properties:
                          passed:
                            type: boolean
                          tx_count_1h:
                            type: integer
                          limit:
                            type: integer
                      amount_threshold:
                        type: object
                        properties:
                          passed:
