components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: OAuth 2.0 access token
      x-scopes:
        description: Per-key scope matrix enforced by the gateway. Keys MUST carry at least one scope from this list.
        scopes:
          charges:read: Read charges, refunds, captures
          charges:write: Create, capture, refund, reverse, or void charges
          payouts:read: Read payouts, settlements, beneficiaries
          payouts:write: Create or cancel payouts and beneficiaries
          customers:read: Read customers, tokens, payment methods
          customers:write: Create, update, or delete customers and tokens
          webhooks:manage: Create, update, rotate, or delete webhook endpoints
          webhooks:replay: Replay deliveries from the dead-letter queue
          reports:read: Read settlements, exports, audit logs, reconciliation reports
          compliance:read: Read KYC/KYB, AML screening, dispute evidence
          compliance:write: Submit KYC/KYB documents, dispute evidence, SAR filings
          admin:*: Full administrative access (admin keys only)
    mtls:
      type: mutualTLS
      description: Client certificate (RFC 8705)
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://api.kangopenbanking.com/v1/oauth-authorize
          tokenUrl: https://api.kangopenbanking.com/v1/oauth-token
          scopes:
            openid: OpenID Connect
            accounts: Read account information
            balances: Read balances
            transactions: Read transactions
            payments: Initiate payments
            offline_access: Refresh tokens
            payments:write: Initiate payments on behalf of the PSU
            accounts:read: Read account information on behalf of the PSU
            profile: Read basic PSU profile information
          refreshUrl: https://api.kangopenbanking.com/v1/oauth-token
    WebhookSignature:
      type: apiKey
      in: header
      name: X-Webhook-Signature
      description: >-
        HMAC-SHA256 signature over `${timestamp}.${body}` using the endpoint secret. Format `t=<ts>,v1=<hex>`. Reject if
        `|now - t| > 300s` (Stripe/OWASP convention).
  schemas:
    DcrRegistrationRequest:
      type: object
      required:
        - software_statement
        - redirect_uris
      description: >-
        Dynamic Client Registration request per RFC 7591, with FAPI 1.0 Advanced extensions. The software_statement is a
        signed JWT (SSA) issued by the KOB Directory containing the TPP's identity claims.
      properties:
        software_statement:
          type: string
          format: jwt
          description: >-
            Signed Software Statement Assertion (SSA) JWT from the KOB Directory. Must contain software_id,
            software_client_name, and software_roles claims (RFC 7591 Section 2.3).
          example: >-
            eyJhbGciOiJQUzI1NiIsInR5cCI6IkpXVCJ9.eyJzb2Z0d2FyZV9pZCI6InRwcF8wMDEiLCJzb2Z0d2FyZV9jbGllbnRfbmFtZSI6IkZpblRlY2ggQXBwIENhbWVyb3VuIiwic29mdHdhcmVfcm9sZXMiOlsiQUlTUCIsIlBJU1AiXSwic29mdHdhcmVfcmVkaXJlY3RfdXJpcyI6WyJodHRwczovL2FwcC5leGFtcGxlLmNvbS9jYWxsYmFjayJdfQ.signature
        redirect_uris:
          type: array
          items:
            type: string
            format: uri
          description: OAuth 2.0 redirect URIs. Must use HTTPS in production (RFC 7591 Section 2).
          example:
            - https://app.example.com/callback
            - https://app.example.com/silent-renew
        client_name:
          type: string
          description: >-
            Human-readable name of the client application. If omitted, extracted from software_statement (RFC 7591
            Section 2).
          example: FinTech App Cameroun
        token_endpoint_auth_method:
          type: string
          description: >-
            Authentication method for the token endpoint. tls_client_auth is the default for FAPI 1.0 Advanced clients
            (FAPI 1.0 ADV Section 5.2.2).
          enum:
            - tls_client_auth
            - private_key_jwt
            - client_secret_basic
            - client_secret_post
            - none
          default: tls_client_auth
        grant_types:
          type: array
          description: OAuth 2.0 grant types the client will use (RFC 7591 Section 2).
          items:
            type: string
            enum:
              - authorization_code
              - refresh_token
              - client_credentials
          default:
            - authorization_code
            - refresh_token
          example:
            - authorization_code
            - refresh_token
        response_types:
          type: array
          description: OAuth 2.0 response types the client will use (RFC 7591 Section 2).
          items:
            type: string
            enum:
              - code
              - code id_token
          default:
            - code
        scope:
          type: string
          description: Space-delimited list of requested scopes (RFC 7591 Section 2).
          default: accounts payments
          example: accounts payments openid
        jwks_uri:
          type: string
          format: uri
          description: URL of the client's JSON Web Key Set document. Mutually exclusive with jwks (RFC 7591 Section 2).
          example: https://app.example.com/.well-known/jwks.json
        jwks:
          type: object
          description: >-
            Inline JSON Web Key Set. Mutually exclusive with jwks_uri. Use when the client cannot host a JWKS endpoint
            (RFC 7591 Section 2).
          properties:
            keys:
              type: array
              items:
                type: object
        application_type:
          type: string
          enum:
            - web
            - native
          default: web
          description: Kind of application (OIDC Core Section 2).
        id_token_signed_response_alg:
          type: string
          enum:
            - PS256
            - ES256
            - RS256
          default: PS256
          description: >-
            Algorithm for signing ID Tokens issued to this client. PS256 required for FAPI 1.0 Advanced (FAPI 1.0 ADV
            Section 5.2.2).
        request_object_signing_alg:
          type: string
          enum:
            - PS256
            - ES256
          default: PS256
          description: Algorithm used to sign Request Objects sent to this server (FAPI 1.0 ADV Section 5.2.2).
    DcrRegistrationResponse:
      type: object
      required:
        - client_id
        - client_secret
        - client_name
        - software_id
        - redirect_uris
        - grant_types
        - response_types
        - token_endpoint_auth_method
        - scope
        - environment
        - client_id_issued_at
      description: >-
        Dynamic Client Registration response per RFC 7591. The client_secret is returned in plaintext exactly once at
        registration time and must be stored securely by the caller.
      properties:
        client_id:
          type: string
          description: Unique client identifier issued by the authorization server.
          example: tpp_a1b2c3d4-e5f6-7890-abcd-ef1234567890
        client_secret:
          type: string
          description: >-
            Client secret. Returned in plaintext ONLY at registration time. Store securely; it cannot be retrieved
            again.
          example: kob_sec_7f3a9b2c4d5e6f1a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f
        client_name:
          type: string
          description: Human-readable name of the registered client.
          example: FinTech App Cameroun
        software_id:
          type: string
          description: Software identifier extracted from the SSA.
          example: tpp_001
        software_roles:
          type: array
          items:
            type: string
            enum:
              - AISP
              - PISP
              - CBPII
          description: Roles granted to the software (from SSA claims).
          example:
            - AISP
            - PISP
        redirect_uris:
          type: array
          items:
            type: string
            format: uri
          description: Registered redirect URIs.
          example:
            - https://app.example.com/callback
        grant_types:
          type: array
          items:
            type: string
          description: Granted OAuth 2.0 grant types.
          example:
            - authorization_code
            - refresh_token
        response_types:
          type: array
          items:
            type: string
          description: Granted OAuth 2.0 response types.
          example:
            - code
        token_endpoint_auth_method:
          type: string
          description: Registered authentication method for the token endpoint.
          example: tls_client_auth
        jwks_uri:
          type: string
          format: uri
          description: Registered JWKS endpoint (if provided).
          example: https://app.example.com/.well-known/jwks.json
        scope:
          type: string
          description: Granted scopes (space-delimited).
          example: accounts payments
        environment:
          type: string
          enum:
            - sandbox
            - production
          description: Environment the client is registered in. New registrations default to sandbox.
          example: sandbox
        client_id_issued_at:
          type: integer
          description: Unix timestamp (seconds) when the client_id was issued.
          example: 1710504000
    Error:
      type: object
      required:
        - error
        - error_code
        - message
        - error_id
        - timestamp
      properties:
        error:
          type: string
          description: Machine-readable error code
          example: invalid_request
        error_code:
          type: string
          description: Domain-prefixed error code
          example: AUTH_001
        message:
          type: string
          description: Human-readable description
          example: The request is missing a required parameter.
        details:
          type: object
          description: Additional context
          additionalProperties: true
        error_id:
          type: string
          description: Unique error trace ID
          example: err_a1b2c3d4
        timestamp:
          type: string
          format: date-time
    Pagination:
      type: object
      description: Standard pagination metadata for list responses
      required:
        - page
        - limit
        - total
        - has_next
      properties:
        page:
          type: integer
          description: Current page number (1-based)
          example: 1
        limit:
          type: integer
          description: Number of items per page
          example: 20
        total:
          type: integer
          description: Total number of items across all pages
          example: 150
        has_next:
          type: boolean
          description: Whether a next page exists
          example: true
        next_cursor:
          type: string
          description: Opaque cursor for the next page (cursor-based pagination)
          example: eyJpZCI6IjEyMyJ9
    Account:
      type: object
      properties:
        account_id:
          type: string
          format: uuid
        account_number:
          type: string
          example: CM21 10003 00100 0123456789 023
        account_type:
          type: string
          enum:
            - checking
            - savings
            - loan
            - business
        account_subtype:
          type: string
          enum:
            - personal_current
            - business_current
            - fixed_deposit
            - savings_regular
        identification_scheme:
          type: string
          enum:
            - LOCAL_BANK
            - MOMO
            - IBAN
            - DOMESTIC_RIB
          description: Account identifier scheme
        identification_value:
          type: string
          description: Raw account identifier value
        currency:
          type: string
          default: XAF
          example: XAF
          enum:
            - XAF
            - XOF
            - USD
            - EUR
            - GBP
            - CNY
            - NGN
            - GHS
            - KES
            - ZAR
          description: ISO 4217 currency code. Default is XAF (Central African CFA Franc).
        balance:
          type: string
          example: '1500000'
          pattern: ^[0-9]{1,15}$
          description: >-
            Represented as a string integer in the currency's minor unit (XAF has no subunits). Must be consistent with
            the currency field.
        account_holder_name:
          type: string
          example: Jean-Pierre Kamga
        status:
          type: string
          enum:
            - active
            - inactive
            - frozen
            - closed
        opened_date:
          type: string
          format: date
          example: '2025-03-15'
        rib_bank_code:
          type: string
          maxLength: 5
          example: '10005'
          description: First 5 digits of RIB (bank code)
        rib_branch_code:
          type: string
          maxLength: 5
          example: '00100'
          description: Digits 6-10 of RIB (branch code)
        rib_account_number:
          type: string
          maxLength: 11
          example: '01234567890'
          description: Digits 11-21 of RIB (account number)
        rib_key:
          type: string
          maxLength: 2
          example: '23'
          description: Digits 22-23 of RIB (MOD-97 key)
        swift_bic:
          type: string
          maxLength: 11
          example: AFRIACMCXXX
          description: SWIFT/BIC code (8 or 11 chars)
        account_country:
          type: string
          maxLength: 2
          example: CM
          description: ISO 3166-1 alpha-2 country code
      required:
        - account_id
        - account_type
        - account_subtype
        - currency
        - identification_scheme
        - identification_value
        - status
    Balance:
      type: object
      properties:
        balance_type:
          type: string
          enum:
            - ClosingAvailable
            - ClosingBooked
            - Expected
            - ForwardAvailable
        amount:
          type: string
          example: '1500000'
          pattern: ^[0-9]{1,15}$
          description: >-
            Represented as a string integer in the currency's minor unit (XAF has no subunits). Must be consistent with
            the currency field.
        currency:
          type: string
          example: XAF
          enum:
            - XAF
            - XOF
            - USD
            - EUR
            - GBP
            - CNY
            - NGN
            - GHS
            - KES
            - ZAR
          default: XAF
          description: ISO 4217 currency code. Default is XAF (Central African CFA Franc).
        credit_debit_indicator:
          type: string
          enum:
            - Credit
            - Debit
        date_time:
          type: string
          format: date-time
      required:
        - balance_type
        - amount
        - currency
        - credit_debit_indicator
        - date_time
    Transaction:
      type: object
      properties:
        transaction_id:
          type: string
          format: uuid
        amount:
          type: string
          example: '25000'
          pattern: ^[0-9]{1,15}$
          description: >-
            Represented as a string integer in the currency's minor unit (XAF has no subunits). Must be consistent with
            the currency field.
        currency:
          type: string
          example: XAF
          enum:
            - XAF
            - XOF
            - USD
            - EUR
            - GBP
            - CNY
            - NGN
            - GHS
            - KES
            - ZAR
          default: XAF
          description: ISO 4217 currency code. Default is XAF (Central African CFA Franc).
        type:
          type: string
          enum:
            - debit
            - credit
        description:
          type: string
          example: Mobile Money transfer from 237650000000
        balance_after:
          type: string
          pattern: ^[0-9]{1,15}(\.[0-9]{1,4})?$
          description: Account balance after this transaction, as a decimal string to avoid floating-point precision issues.
          example: '1475000'
        booking_date:
          type: string
          format: date
        value_date:
          type: string
          format: date
        timestamp:
          type: string
          format: date-time
        AccountId:
          type: string
          description: OBIE alias for the account identifier. Maps to account_id in parent resource context.
        TransactionId:
          type: string
          description: OBIE alias for transaction_id.
        Amount:
          type: string
          pattern: ^[0-9]{1,15}$
          description: OBIE alias for amount.
        Currency:
          type: string
          enum:
            - XAF
            - XOF
            - USD
            - EUR
            - GBP
            - CNY
            - NGN
            - GHS
            - KES
            - ZAR
          description: OBIE alias for currency.
        CreditDebitIndicator:
          type: string
          enum:
            - Credit
            - Debit
          description: OBIE alias for type. Maps credit/debit to transaction direction.
        BookingDateTime:
          type: string
          format: date-time
          description: OBIE alias for booking_date.
        ValueDateTime:
          type: string
          format: date-time
          description: OBIE alias for value_date.
        TransactionInformation:
          type: string
          maxLength: 500
          description: >-
            OBIE OBTransaction6 alias for the description field. Narrative text conveying information from the
            originator to the beneficiary about the payment transaction.
          example: Payment for Invoice INV-2025-001 — Professional Services
        Status:
          type: string
          enum:
            - Booked
            - Pending
            - Rejected
          description: >-
            OBIE OBTransaction6 transaction status. Booked = settled, Pending = authorised but not yet settled, Rejected
            = declined or failed.
      x-obie-mapping:
        AccountId: account_id
        TransactionId: transaction_id
        Amount: amount
        Currency: currency
        CreditDebitIndicator: type
        BookingDateTime: booking_date
        ValueDateTime: value_date
      required:
        - transaction_id
        - amount
        - currency
        - type
        - timestamp
      x-naming-convention: >-
        This schema uses dual naming: snake_case (native) and PascalCase (OBIE-compatible). Both represent the same
        field. SDK consumers should use snake_case. OBIE-conformant consumers may use PascalCase aliases. A future
        version will support content negotiation via Accept: application/json;profile=obie.
    Payment:
      type: object
      properties:
        payment_id:
          type: string
          format: uuid
        amount:
          type: string
          example: '50000'
          pattern: ^[0-9]{1,15}$
          description: >-
            Represented as a string integer in the currency's minor unit (XAF has no subunits). Must be consistent with
            the currency field.
        currency:
          type: string
          default: XAF
          enum:
            - XAF
            - XOF
            - USD
            - EUR
            - GBP
            - CNY
            - NGN
            - GHS
            - KES
            - ZAR
          description: ISO 4217 currency code. Default is XAF (Central African CFA Franc).
        status:
          type: string
          enum:
            - pending
            - authorized
            - submitted
            - completed
            - failed
            - cancelled
        debtor_account:
          type: string
          example: CM21 10003 00100 0123456789 023
        creditor_account:
          type: string
          example: CM21 10003 00200 9876543210 045
        reference:
          type: string
          example: Invoice-2026-001
        created_at:
          type: string
          format: date-time
      required:
        - payment_id
        - amount
        - currency
        - status
        - debtor_account
        - creditor_account
    Consent:
      type: object
      properties:
        consent_id:
          type: string
        status:
          type: string
          enum:
            - AwaitingAuthorisation
            - Authorised
            - Rejected
            - Consumed
            - Expired
            - Revoked
        permissions:
          type: array
          items:
            type: string
        expiration_date:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
      required:
        - consent_id
        - status
        - permissions
        - expiration_date
        - created_at
    Bank:
      type: object
      properties:
        id:
          type: string
          format: uuid
        legal_name:
          type: string
          example: Afriland First Bank
        display_name:
          type: string
        short_code:
          type: string
          example: AFB
        country:
          type: string
          default: CM
        swift_bic:
          type: string
          example: AFRIACMCXXX
        bank_code:
          type: string
        status:
          type: string
          enum:
            - draft
            - submitted
            - active
            - suspended
        integration_mode:
          type: string
          enum:
            - connector_push
            - connector_pull
            - file_feed
            - hybrid
        contact_email:
          type: string
        support_phone:
          type: string
      required:
        - id
        - legal_name
        - short_code
        - country
    InterbankPayment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        external_reference:
          type: string
        debtor_participant_id:
          type: string
          format: uuid
        creditor_participant_id:
          type: string
          format: uuid
        amount:
          type: string
          example: '500000'
          pattern: ^[0-9]{1,15}$
          description: >-
            Represented as a string integer in the currency's minor unit (XAF has no subunits). Must be consistent with
            the currency field.
        currency:
          type: string
          default: XAF
          enum:
            - XAF
            - XOF
            - USD
            - EUR
            - GBP
            - CNY
            - NGN
            - GHS
            - KES
            - ZAR
          description: ISO 4217 currency code. Default is XAF (Central African CFA Franc).
        status:
          type: string
          enum:
            - created
            - validated
            - submitted
            - accepted
            - rejected
            - in_process
            - settled
            - failed
            - reversed
            - expired
        correlation_id:
          type: string
        requested_at:
          type: string
          format: date-time
        settled_at:
          type: string
          format: date-time
      required:
        - id
        - debtor_participant_id
        - creditor_participant_id
        - amount
        - currency
        - status
    Certificate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        thumbprint:
          type: string
        fingerprint:
          type: string
        subject_dn:
          type: string
        issuer_dn:
          type: string
        serial_number:
          type: string
        valid_from:
          type: string
          format: date-time
        valid_until:
          type: string
          format: date-time
        is_revoked:
          type: boolean
      required:
        - id
        - thumbprint
        - subject_dn
        - issuer_dn
    CreditScore:
      type: object
      properties:
        score:
          type: integer
          minimum: 300
          maximum: 850
          example: 680
        grade:
          type: string
          enum:
            - A
            - B
            - C
            - D
            - F
        score_range:
          type: string
          enum:
            - Poor
            - Fair
            - Good
            - Very Good
            - Excellent
        calculated_at:
          type: string
          format: date-time
        data_sources:
          type: array
          description: >-
            Inputs combined to produce this score. CEMAC deployments fold in mobile-money history, njangi (tontine)
            participation, and the COBAC Centrale des Risques registry alongside conventional bureau data.
          items:
            type: string
            enum:
              - mobile_money_history
              - bank_transactions
              - utility_payments
              - njangi_participation
              - merchant_sales
              - bureau_creditinfo
              - cobac_registry
              - agent_float_history
          example:
            - mobile_money_history
            - njangi_participation
            - cobac_registry
        locale_band:
          type: string
          enum:
            - cemac_v1
            - fico_us
            - experian_eu
          default: cemac_v1
          description: Scoring band semantics. The 300-850 scale is shared but A-F grade cutoffs differ per band.
          example: cemac_v1
      required:
        - score
        - grade
        - calculated_at
    LoanApplication:
      type: object
      properties:
        id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        amount:
          type: string
          example: '1000000'
          pattern: ^[0-9]{1,15}$
          description: >-
            Represented as a string integer in the currency's minor unit (XAF has no subunits). Must be consistent with
            the currency field.
        currency:
          type: string
          example: XAF
          enum:
            - XAF
            - XOF
            - USD
            - EUR
            - GBP
            - CNY
            - NGN
            - GHS
            - KES
            - ZAR
          default: XAF
          description: ISO 4217 currency code. Default is XAF (Central African CFA Franc).
        term_months:
          type: integer
          example: 12
        interest_rate:
          type: number
          example: 15
        status:
          type: string
          enum:
            - applied
            - under_review
            - approved
            - rejected
            - disbursed
            - active
            - completed
            - defaulted
            - written_off
        purpose:
          type: string
          example: Business expansion
        created_at:
          type: string
          format: date-time
      required:
        - id
        - product_id
        - amount
        - currency
        - term_months
        - status
    LoanScheduleItem:
      type: object
      properties:
        installment_number:
          type: integer
          example: 1
        due_date:
          type: string
          format: date
          example: '2026-03-16'
        principal:
          type: string
          example: '80000'
          pattern: ^-?[0-9]{1,15}$
          format: monetary-minor-unit
          x-coercion: numeric→string in v4.29.0 per FAPI 1.0 Adv §5.2.2 / RFC 8259 precision
          deprecated: true
          description: ' [DEPRECATED — removal in v5.0.0. Use `principal_amount` (zero-decimal string, ^[0-9]{1,15}$).]'
        interest:
          type: string
          example: '12500'
          pattern: ^-?[0-9]{1,15}$
          format: monetary-minor-unit
          x-coercion: numeric→string in v4.29.0 per FAPI 1.0 Adv §5.2.2 / RFC 8259 precision
          deprecated: true
          description: ' [DEPRECATED — removal in v5.0.0. Use `interest_amount` (zero-decimal string, ^[0-9]{1,15}$).]'
        fees:
          type: string
          example: '0'
          pattern: ^-?[0-9]{1,15}$
          format: monetary-minor-unit
          x-coercion: numeric→string in v4.29.0 per FAPI 1.0 Adv §5.2.2 / RFC 8259 precision
        total_due:
          type: number
          example: 92500
          deprecated: true
          description: ' [DEPRECATED — removal in v5.0.0. Use `total_due_amount` (zero-decimal string, ^[0-9]{1,15}$).]'
        outstanding_balance:
          type: string
          example: '920000'
          pattern: ^[0-9]{1,15}$
          description: Represented as a string integer in the currency's minor unit (XAF has no subunits).
        status:
          type: string
          enum:
            - pending
            - paid
            - partial
            - overdue
      required:
        - installment_number
