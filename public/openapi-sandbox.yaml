        amount:
          type: string
          pattern: ^[0-9]{1,15}$
          description: >-
            Represented as a string integer in the currency's minor unit (XAF has no subunits). Must be consistent with
            the currency field.
        currency:
          type: string
          enum:
            - XAF
            - XOF
            - USD
            - EUR
            - GBP
            - CNY
            - NGN
            - GHS
            - KES
            - ZAR
          default: XAF
