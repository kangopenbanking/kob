          format: uuid
        plan_id:
          type: string
          format: uuid
        customer_email:
          type: string
        customer_phone:
          type: string
        status:
          type: string
          enum:
            - active
            - paused
            - cancelled
            - completed
            - past_due
        current_period_start:
          type: string
          format: date-time
        current_period_end:
          type: string
          format: date-time
        next_charge_date:
          type: string
          format: date-time
        charges_count:
          type: integer
        created_at:
          type: string
          format: date-time
        trial_start:
          type: string
          format: date-time
          nullable: true
          description: UTC datetime when the trial period started. Null if no trial was applied to this subscription.
          example: '2025-03-01T00:00:00Z'
        trial_end:
          type: string
          format: date-time
          nullable: true
          description: >-
            UTC datetime when the trial period ends or ended. After this datetime, regular billing resumes. Null if no
            trial was applied.
          example: '2025-03-15T00:00:00Z'
        cancel_at_period_end:
          type: boolean
          default: false
          description: >-
            When true, the subscription is scheduled to cancel at the end of the current billing period
            (current_period_end) rather than immediately. The status remains 'active' until then.
          example: false
        cancelled_at:
          type: string
          format: date-time
          nullable: true
          description: >-
            UTC datetime when the subscription was cancelled (either immediately or when a scheduled end-of-period
            cancellation took effect). Null if subscription is still active.
          example: '2025-04-01T00:00:00Z'
        billing_cycle_anchor:
          type: string
          format: date-time
          nullable: true
          description: >-
            UTC datetime that defines the billing cycle. Future billing dates are calculated relative to this anchor.
            Useful for aligning subscription billing to a fixed day of the month.
          example: '2025-01-01T00:00:00Z'
        metadata:
          type: object
          additionalProperties:
            type: string
          maxProperties: 20
          description: >-
            Arbitrary key-value metadata attached to this subscription. Keys and values must be strings. Maximum 20
            pairs.
          example:
            customer_ref: CUST-001
            plan_tier: professional
      required:
        - id
        - plan_id
        - status
        - current_period_start
        - current_period_end
        - created_at
