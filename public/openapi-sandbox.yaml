  /v1/oauth/authorize:
    get:
      tags:
        - OAuth
      summary: Authorize OAuth request
      description: Initiate OAuth 2.0 authorization flow with PKCE (FAPI 1.0 Advanced)
      operationId: oauthAuthorize
      security: []
      parameters:
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            enum:
              - code
        - name: client_id
          in: query
          required: true
          schema:
            type: string
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
        - name: scope
          in: query
          required: true
          schema:
            type: string
          example: openid accounts payments
        - name: state
          in: query
          required: true
          schema:
            type: string
        - name: code_challenge
          in: query
          schema:
            type: string
          required: true
          description: >-
            PKCE code challenge. The Base64URL-encoded SHA-256 hash of the code_verifier (S256 method). REQUIRED by FAPI
            1.0 Advanced Section 5.2.2 for all authorization requests. The corresponding code_verifier must be provided
            at the token endpoint.
        - name: code_challenge_method
          in: query
          schema:
            type: string
            enum:
              - S256
          required: true
          description: >-
            PKCE code challenge method. MUST be S256 (SHA-256). Plain method is NOT supported per FAPI 1.0 Advanced
            security requirements.
        - name: nonce
          in: query
          required: true
          description: >-
            Cryptographically random nonce value associating the client session with the ID Token and preventing replay
            attacks. REQUIRED by FAPI 1.0 Advanced Section 5.2.2-14 for all authorization requests. Must be unique per
            request with at least 128 bits of entropy (minimum 22 Base64url characters). The server MUST include the
            nonce claim in the issued ID Token.
          schema:
            type: string
        - name: request_uri
          in: query
          required: false
          description: 'FAPI 1.0 Advanced: URI referencing a Pushed Authorization Request (PAR). Mutually exclusive with request.'
          schema:
            type: string
            format: uri
        - name: request
          in: query
          required: false
          description: >-
            FAPI 1.0 Advanced: Signed JWT containing the authorization request parameters (Request Object). Mutually
            exclusive with request_uri.
          schema:
            type: string
        - name: acr_values
          in: query
          required: false
          description: >-
            Space-separated string of requested Authentication Context Class Reference values. e.g.
            "urn:openbanking:psd2:sca"
          schema:
            type: string
            example: urn:openbanking:psd2:sca
        - name: claims
          in: query
          required: false
          description: JSON object requesting specific claims in the ID Token or UserInfo response (OIDC Core Section 5.5).
          schema:
            type: string
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/Tracestate'
        - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '302':
          description: Redirect to authorization page
          headers:
            Location:
              schema:
                type: string
                format: uri
              description: Authorization page URL
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
            X-Trace-Id:
              description: >-
                Distributed trace identifier for this request. Echoes the inbound X-Trace-Id or W3C traceparent when
                present; otherwise a server-generated UUID v4.
              schema:
                type: string
        '400':
          description: Bad request
          content:
