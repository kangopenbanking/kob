  /v1/escrow:
    post:
      tags:
        - Payment Gateway
      summary: Create escrow hold
      operationId: escrowCreate
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: >-
            Required on all POST/PUT endpoints. Unique key for idempotent request processing (UUID v4 recommended). Keys
            expire after 24 hours.
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/Tracestate'
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - merchant_id
                - amount
                - currency
              properties:
                merchant_id:
                  type: string
                  format: uuid
                amount:
                  type: string
                  pattern: ^[0-9]{1,15}$
                  description: >-
                    Represented as a string integer in the currency's minor unit (XAF has no subunits). Must be
                    consistent with the currency field.
                currency:
                  type: string
                  default: XAF
                  enum:
                    - XAF
                    - XOF
                    - USD
                    - EUR
                    - GBP
                    - CNY
                    - NGN
                    - GHS
                    - KES
                    - ZAR
                  description: ISO 4217 currency code. Default is XAF (Central African CFA Franc).
                description:
                  type: string
                release_conditions:
                  type: object
                  description: Structured conditions that must be satisfied before the escrow can be released
                  properties:
                    type:
                      type: string
                      enum:
                        - time_based
                        - confirmation_based
                        - milestone_based
                        - manual
                      description: The type of release trigger
                    release_after_date:
                      type: string
                      format: date-time
                      description: 'For time_based: UTC datetime after which auto-release is permitted'
                    required_confirmations:
                      type: integer
                      description: 'For confirmation_based: number of parties that must confirm before release'
                      minimum: 1
                      maximum: 10
                    milestones:
                      type: array
                      description: 'For milestone_based: list of milestone descriptions that must be marked complete'
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                          description:
                            type: string
                          completed:
                            type: boolean
                            default: false
                    human_readable_summary:
                      type: string
                      description: Plain English description of the release conditions for audit and display purposes
                  required:
                    - type
                    - human_readable_summary
                expires_at:
                  type: string
                  format: date-time
      responses:
        '201':
          description: Escrow created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            type: string
                          amount:
                            type: string
                            pattern: ^[0-9]{1,15}$
                            description: >-
                              Represented as a string integer in the currency's minor unit (XAF has no subunits). Must
                              be consistent with the currency field.
                          currency:
                            type: string
                            enum:
                              - XAF
                              - XOF
                              - USD
                              - EUR
                              - GBP
                              - CNY
                              - NGN
                              - GHS
                              - KES
                              - ZAR
                            default: XAF
                            description: ISO 4217 currency code. Default is XAF (Central African CFA Franc).
                          status:
                            type: string
                            example: active
                          created_at:
                            type: string
                            format: date-time
          headers:
            x-fapi-interaction-id:
              $ref: '#/components/headers/XFapiInteractionIdResponse'
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
            X-Trace-Id:
              description: >-
                Distributed trace identifier for this request. Echoes the inbound X-Trace-Id or W3C traceparent when
                present; otherwise a server-generated UUID v4.
              schema:
                type: string
