  /v1/kyc/submit:
    post:
      tags:
        - KYC & Compliance
      summary: Submit KYC documents
      operationId: kycSubmit
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: >-
            Required on all POST/PUT endpoints. Unique key for idempotent request processing (UUID v4 recommended). Keys
            expire after 24 hours.
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/Tracestate'
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - document_type
                - document_number
                - date_of_birth
                - nationality
              properties:
                document_type:
                  type: string
                  enum:
                    - national_id
                    - passport
                    - drivers_license
                document_number:
                  type: string
                document_front_url:
                  type: string
                document_back_url:
                  type: string
                selfie_url:
                  type: string
                  format: uri
                  description: URL of the selfie image captured during liveness check. Required for Tier 2 and above CDD.
                liveness_check_token:
                  type: string
                  description: Token returned by the liveness detection provider confirming a real person was captured.
                date_of_birth:
                  type: string
                  format: date
                  description: Customer date of birth in ISO 8601 format. Required for PEP and sanctions screening age correlation.
                  example: '1985-06-15'
                nationality:
                  type: string
                  maxLength: 2
                  description: ISO 3166-1 alpha-2 nationality code. Required for jurisdictional risk assessment.
                  example: CM
                tax_identification_number:
                  type: string
                  description: Customer Tax Identification Number (TIN / NIU in Cameroon). Required under COBAC CDD obligations.
                  example: P123456789
                address_proof_url:
                  type: string
                  format: uri
                  description: URL of supporting address verification document (utility bill, bank statement, etc.).
                residential_address:
                  type: object
                  description: Customer's current residential address
                  properties:
                    street_line1:
                      type: string
                    street_line2:
                      type: string
                    city:
                      type: string
                    region:
                      type: string
                    postal_code:
                      type: string
                    country:
                      type: string
                      maxLength: 2
                      description: ISO 3166-1 alpha-2 country code
                  required:
                    - street_line1
                    - city
                    - country
      responses:
        '201':
          description: KYC submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
          headers:
            x-fapi-interaction-id:
              $ref: '#/components/headers/XFapiInteractionIdResponse'
            X-RateLimit-Limit:
