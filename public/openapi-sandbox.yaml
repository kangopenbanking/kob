  /v1/woocommerce/process-payment:
    post:
      tags:
        - WooCommerce
      summary: Process WooCommerce payment
      description: Initiates a payment for a WooCommerce order. Called by the WordPress plugin during checkout.
      operationId: woocommerceProcessPayment
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: >-
            Required on all POST/PUT endpoints. Unique key for idempotent request processing (UUID v4 recommended). Keys
            expire after 24 hours.
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/Tracestate'
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
                - currency
                - woocommerce_order_id
                - customer_email
              properties:
                amount:
                  type: string
                  example: '25000'
                  pattern: ^[0-9]{1,15}$
                  description: >-
                    Represented as a string integer in the currency's minor unit (XAF has no subunits). Must be
                    consistent with the currency field.
                currency:
                  type: string
                  default: XAF
                  enum:
                    - XAF
                    - XOF
                    - USD
                    - EUR
                    - GBP
                    - CNY
                    - NGN
                    - GHS
                    - KES
                    - ZAR
                  description: ISO 4217 currency code. Default is XAF (Central African CFA Franc).
                woocommerce_order_id:
                  type: integer
                  example: 1234
                customer_email:
                  type: string
                  format: email
                customer_name:
                  type: string
                customer_phone:
                  type: string
                payment_methods:
                  type: array
                  items:
                    type: string
                    enum:
                      - mobile_money
                      - card
                      - bank_transfer
                return_url:
                  type: string
                  format: uri
                cancel_url:
                  type: string
                  format: uri
                webhook_url:
                  type: string
                  format: uri
                metadata:
                  type: object
      responses:
        '200':
          description: Payment initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction_ref:
                    type: string
                  payment_url:
                    type: string
