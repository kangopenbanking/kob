          in: query
          schema:
            type: integer
            default: 25
            maximum: 100
          description: Items per page
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: >-
            Items to skip Legacy: kept for backwards compatibility — prefer starting_after/ending_before (see
            x-pagination).
        - name: sort_by
          in: query
          schema:
            type: string
            default: created_at
          description: Sort field
        - name: sort_order
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
          description: Sort direction
        - name: starting_after
          in: query
          required: false
          description: >-
            Cursor pagination — returns the page of results AFTER this resource id. Mutually exclusive with
            offset/ending_before. Preferred for new integrations (see x-pagination).
          schema:
            type: string
            example: acc_01HZQ...
        - name: ending_before
          in: query
          required: false
          description: >-
            Cursor pagination — returns the page of results BEFORE this resource id. Mutually exclusive with
            offset/starting_after.
          schema:
            type: string
            example: acc_01HZQ...
