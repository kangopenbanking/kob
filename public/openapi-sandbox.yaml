                      - interbank.payment_completed
                      - interbank.payment_returned
                      - pay_by_bank.intent_authorised
                      - pay_by_bank.intent_rejected
                      - pay_by_bank.payment_completed
                      - subscription.created
                      - subscription.renewed
                      - subscription.cancelled
                      - subscription.payment_failed
