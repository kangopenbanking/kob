    get:
      operationId: getLocalizedError
      tags:
        - Reference
      summary: Look up an error code with localized title and detail
      description: >-
        Returns the localized title and detail for any RFC 7807 error code emitted by KOB. Useful for bilingual
        call-centre tooling.
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
            pattern: ^[A-Z]{2,6}_[0-9]{3,4}$
          example: AUTH_001
        - name: lang
          in: query
          required: false
          schema:
            type: string
            enum:
              - en
              - fr
              - fr-CM
              - en-CM
            default: en
        - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          description: Localized error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocalizedError'
          headers:
            Content-Language:
              $ref: '#/components/headers/Content-Language'
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
        '404':
          description: Unknown code
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
