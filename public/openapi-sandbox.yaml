          type: integer
          minimum: 1
          maximum: 3600
          example: 3
        provider_p50_ms:
          type: integer
          minimum: 0
          example: 18000
        provider_p95_ms:
          type: integer
          minimum: 0
          example: 42000
      required:
        - expected_completion_seconds
