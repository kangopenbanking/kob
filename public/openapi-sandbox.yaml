                  type: string
                  default: XAF
                  enum:
                    - XAF
                    - XOF
                    - USD
                    - EUR
                    - GBP
                    - CNY
                    - NGN
                    - GHS
                    - KES
                    - ZAR
                  description: ISO 4217 currency code. Default is XAF (Central African CFA Franc).
                channel:
                  type: string
                  enum:
                    - mobile_money
                    - card
                    - bank_transfer
                    - apple_pay
                    - google_pay
                    - ussd
                    - paypal
                customer_phone:
                  type: string
                customer_email:
                  type: string
                tx_ref:
                  type: string
                metadata:
                  type: object
