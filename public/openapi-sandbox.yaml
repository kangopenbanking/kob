      summary: Register webhook endpoint (v2)
      description: >-
        Register a new webhook endpoint with event filtering and unique signing secret. All delivered webhook payloads
        follow the WebhookEventPayload schema (see components/schemas/WebhookEventPayload). The data field contains the
        event-specific resource object referenced in the event type mapping.
      operationId: webhookV2Create
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: >-
            Required on all POST/PUT endpoints. Unique key for idempotent request processing (UUID v4 recommended). Keys
            expire after 24 hours.
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/Tracestate'
        - $ref: '#/components/parameters/AcceptLanguage'
