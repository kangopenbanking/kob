            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
            X-Trace-Id:
              description: >-
                Distributed trace identifier for this request. Echoes the inbound X-Trace-Id or W3C traceparent when
                present; otherwise a server-generated UUID v4.
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
          headers:
            X-Trace-Id:
              description: >-
