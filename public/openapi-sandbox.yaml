                  type: string
                  format: uuid
                business_name:
                  type: string
                settlement_bank:
                  type: string
                account_number:
                  type: string
                split_type:
                  type: string
                  enum:
                    - percentage
                    - flat
                split_value:
                  type: number
                country:
                  type: string
                  default: CM
