    PaymentIntent:
      type: object
      description: >-
        Rail-agnostic asynchronous payment intent. Models the canonical lifecycle of any payment from creation through
        terminal state. State machine (Stripe API Reference §payment_intents): requires_payment_method →
        requires_confirmation → processing → (requires_action → processing →)* succeeded | canceled | failed.
      required:
        - id
        - amount
        - currency
        - status
        - payment_method_types
        - created_at
      properties:
        id:
          type: string
          format: uuid
        amount:
          type: integer
          format: int64
          minimum: 1
          description: Smallest currency unit; for XAF/XOF this is the whole amount (zero-decimal).
        currency:
          type: string
          pattern: ^[A-Z]{3}$
        status:
          type: string
          enum:
            - requires_payment_method
            - requires_confirmation
            - processing
            - requires_action
            - succeeded
            - canceled
            - failed
        payment_method_types:
          type: array
          items:
            type: string
            enum:
              - mobile_money
              - bank_transfer
              - card
              - pay_by_bank
              - wallet
          minItems: 1
        next_action:
          type: object
          nullable: true
          description: Present when status is `requires_action`. Tells the client what to do next.
          properties:
            type:
              type: string
              enum:
                - redirect_to_url
                - display_qr
                - use_stk_push
                - poll_provider
            redirect_to_url:
              type: object
              properties:
                url:
                  type: string
                  format: uri
                return_url:
                  type: string
                  format: uri
            display_qr:
              type: object
              properties:
                qr_payload:
                  type: string
            use_stk_push:
              type: object
              properties:
                msisdn:
                  type: string
                operator:
                  type: string
        last_error:
          type: object
          nullable: true
          properties:
            code:
              type: string
            message:
              type: string
        description:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        customer_id:
          type: string
          format: uuid
          nullable: true
        child_intent_id:
          type: string
          format: uuid
          nullable: true
          description: ID of the underlying rail-specific intent (e.g. pay-by-bank intent or funding intent).
        child_resource:
          type: string
          nullable: true
          enum:
            - null
            - pay_by_bank_intent
            - funding_intent
            - gateway_charge
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        succeeded_at:
          type: string
          format: date-time
          nullable: true
        canceled_at:
          type: string
          format: date-time
          nullable: true
    PaymentIntentCreate:
      type: object
      required:
        - amount
        - currency
        - payment_method_types
      properties:
        amount:
          type: integer
          format: int64
          minimum: 1
        currency:
          type: string
          pattern: ^[A-Z]{3}$
        payment_method_types:
          type: array
          items:
            type: string
            enum:
              - mobile_money
              - bank_transfer
              - card
              - pay_by_bank
              - wallet
          minItems: 1
        confirm:
          type: boolean
          default: false
          description: If true, attempt immediate confirmation. If false, intent is created in `requires_confirmation`.
        description:
          type: string
        metadata:
          type: object
          additionalProperties: true
        customer_id:
          type: string
          format: uuid
    PaymentIntentList:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PaymentIntent'
        has_more:
