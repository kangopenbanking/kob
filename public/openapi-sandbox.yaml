          type: string
        customer_email:
          type: string
        fee_amount:
          type: string
          pattern: ^-?[0-9]{1,15}$
          format: monetary-minor-unit
          example: '0'
          x-coercion: numeric→string in v4.29.0 per FAPI 1.0 Adv §5.2.2 / RFC 8259 precision
        net_amount:
          type: string
          pattern: ^-?[0-9]{1,15}$
          format: monetary-minor-unit
          example: '0'
          x-coercion: numeric→string in v4.29.0 per FAPI 1.0 Adv §5.2.2 / RFC 8259 precision
