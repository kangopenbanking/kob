  /v1/remittance/cemac/transfers/{id}/cancel:
    post:
      tags:
        - CEMAC Remittance
      summary: Cancel a pending or funded CEMAC remittance transfer.
      operationId: cemacRemittanceCancel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: RFC-compliant UUID v4 for safe retry.
      responses:
        '200':
          description: Transfer cancelled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CemacRemittanceTransfer'
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
        '404':
          description: Problem details (RFC 7807).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
        '409':
          description: Problem details (RFC 7807).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
  /v1/gateway/global-accounts:
    post:
      tags:
        - Gateway
      summary: Create a Nium-powered global virtual account
      description: >-
        Provisions a real USD/EUR/GBP bank account for the caller via Nium. Incoming credits are converted to XAF (Nium
        FX + configurable spread) and routed to the user's Kang Wallet or Mobile Money. Reference: FAPI 1.0 Advanced,
        RFC 8259.
      operationId: createGlobalAccount
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currency
              properties:
                currency:
                  type: string
                  enum:
                    - USD
                    - EUR
                    - GBP
                beneficiary_name:
                  type: string
                  minLength: 1
                  maxLength: 140
      responses:
        '200':
          description: Existing active account returned (idempotent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NiumGlobalAccount'
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NiumGlobalAccount'
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
        '400':
          description: Invalid request
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
        '401':
          description: Unauthorized
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
        '502':
          description: Nium provider error
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
    get:
      tags:
        - Gateway
      summary: List global virtual accounts and recent incoming payments
      operationId: listGlobalAccounts
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  accounts:
                    type: array
                    items:
                      $ref: '#/components/schemas/NiumGlobalAccount'
                  incoming_payments:
                    type: array
                    items:
                      $ref: '#/components/schemas/NiumIncomingPayment'
                  user_defaults:
                    $ref: '#/components/schemas/NiumPayoutPreference'
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
  /v1/gateway/global-accounts/payout-preference:
    patch:
      tags:
        - Gateway
      summary: Update cash-out routing preference (user default or per-account override)
      operationId: updateGlobalAccountPayoutPreference
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required:
                    - scope
                    - payout_preference
                  properties:
                    scope:
                      type: string
                      enum:
                        - user
                    payout_preference:
                      type: string
                      enum:
                        - KANG_WALLET
                        - MOBILE_MONEY
                    payout_channel:
                      type: string
                      description: Phone number, required for MOBILE_MONEY
                - type: object
                  required:
                    - scope
                    - account_id
                  properties:
                    scope:
                      type: string
                      enum:
                        - account
                    account_id:
                      type: string
                      format: uuid
                    payout_preference_override:
                      type: string
                      nullable: true
                      enum:
                        - KANG_WALLET
                        - MOBILE_MONEY
                        - null
                    payout_channel_override:
                      type: string
                      nullable: true
      responses:
        '200':
          description: Updated
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
        '400':
          description: Invalid request
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
        '404':
          description: Account not found
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
  /v1/gateway/global-accounts/webhook:
    post:
      tags:
        - Gateway
      summary: Nium incoming-payment webhook (provider → KOB)
      description: >-
        Called by Nium when funds land in a global virtual account. HMAC-SHA256 signed via header `x-nium-signature`.
        Idempotent on `transactionId`. KOB applies FX + spread, deducts withdrawal fee (only for MOBILE_MONEY routing),
        credits the user's Kang Wallet, and asynchronously dispatches Mobile Money payouts through Flutterwave when
        applicable.
      operationId: niumIncomingWebhook
      security: []
      parameters:
        - in: header
          name: x-nium-signature
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NiumWebhookEvent'
      responses:
        '200':
          description: Acknowledged
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
        '401':
          description: Invalid signature
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
        '404':
          description: Unknown account
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
