  /v1/banking/withdrawal-requests:
    post:
      tags:
        - Approval Workflows
      summary: Create withdrawal request
      description: >-
        Create a withdrawal request. If the amount exceeds the staff member's policy limit, the request is automatically
        routed into the approval workflow.
      operationId: createWithdrawalRequest
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: >-
            Required on all POST/PUT endpoints. Unique key for idempotent request processing (UUID v4 recommended). Keys
            expire after 24 hours.
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/Tracestate'
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - institution_id
                - account_id
                - amount
              properties:
                institution_id:
                  type: string
                  format: uuid
                branch_id:
                  type: string
                  format: uuid
                account_id:
                  type: string
                  format: uuid
                amount:
                  type: string
                  example: '2000000'
                  pattern: ^[0-9]{1,15}$
                  description: >-
                    Represented as a string integer in the currency's minor unit (XAF has no subunits). Must be
                    consistent with the currency field.
                currency:
                  type: string
                  default: XAF
                  enum:
                    - XAF
                    - XOF
                    - USD
                    - EUR
                    - GBP
                    - CNY
                    - NGN
                    - GHS
                    - KES
                    - ZAR
                  description: ISO 4217 currency code. Default is XAF (Central African CFA Franc).
                channel:
                  type: string
                  default: branch
                reason:
                  type: string
      responses:
        '200':
          description: Request auto-approved and executed
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  status:
