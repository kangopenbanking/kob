    RtpSla:
      type: object
      description: >-
        Real-time payment SLA hints. Indicates the expected confirmation window for the underlying rail. Targets are
        p50/p95 based on the trailing 30-day production sample (see /developer/reference/rtp-sla).
      properties:
        expected_completion_seconds:
          type: integer
          minimum: 1
          maximum: 86400
          example: 18
        sla_tier:
          type: string
          enum:
            - instant
            - p50_30s
            - p95_60s
            - p99_300s
            - best_effort
          example: p50_30s
