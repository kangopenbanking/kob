                      - refund.created
                      - refund.processed
                      - refund.failed
                      - payout.created
                      - payout.processing
                      - payout.completed
                      - payout.failed
                      - payment.initiated
                      - payment.authorised
                      - payment.submitted
                      - payment.completed
                      - payment.rejected
                      - payment.cancelled
                      - dispute.created
                      - dispute.evidence_required
                      - dispute.resolved
                      - settlement.created
                      - settlement.processed
                      - consent.authorised
                      - consent.revoked
                      - consent.expired
                      - loan.applied
