    get:
      tags:
        - OAuth
      summary: OIDC discovery
      operationId: oidcConfig
      security: []
      responses:
        '200':
          description: OIDC configuration document
          content:
            application/json:
              schema:
                type: object
                properties:
                  issuer:
                    type: string
                  authorization_endpoint:
                    type: string
                  token_endpoint:
                    type: string
                  jwks_uri:
                    type: string
                  response_types_supported:
                    type: array
                    items:
                      type: string
                  subject_types_supported:
                    type: array
                    items:
                      type: string
                  id_token_signing_alg_values_supported:
                    type: array
                    items:
                      type: string
                  userinfo_endpoint:
                    type: string
                    example: https://api.kangopenbanking.com/v1/oauth/userinfo
                    description: URL of the UserInfo Endpoint (OIDC Core 1.0 Section 5.3)
                  registration_endpoint:
                    type: string
                    example: https://api.kangopenbanking.com/v1/dcr/register
                    description: URL of the Dynamic Client Registration endpoint (RFC 7591)
                  scopes_supported:
                    type: array
                    items:
                      type: string
                    example:
                      - openid
                      - accounts
                      - balances
                      - transactions
                      - payments
                      - offline_access
                    description: List of OAuth 2.0 scope values supported
                  claims_supported:
                    type: array
                    items:
                      type: string
                    example:
                      - sub
                      - iss
                      - auth_time
                      - acr
                      - name
                      - given_name
                      - family_name
                      - email
                      - phone_number
                    description: List of claim names supported in issued ID Tokens
                  token_endpoint_auth_methods_supported:
                    type: array
                    items:
                      type: string
                    example:
                      - private_key_jwt
                      - tls_client_auth
                      - client_secret_basic
                    description: >-
                      List of client authentication methods supported at the token endpoint. private_key_jwt required
                      for FAPI 1.0 Advanced.
                  request_object_signing_alg_values_supported:
                    type: array
                    items:
                      type: string
                    example:
                      - PS256
                      - ES256
                    description: Signing algorithms supported for Request Objects. PS256 required for FAPI 1.0 Advanced.
                  token_endpoint_auth_signing_alg_values_supported:
                    type: array
                    items:
                      type: string
                    example:
                      - PS256
                      - ES256
                    description: Signing algorithms supported for JWT client authentication at the token endpoint.
                  grant_types_supported:
                    type: array
                    items:
                      type: string
                    example:
                      - authorization_code
                      - refresh_token
                      - client_credentials
                    description: List of OAuth 2.0 grant type values supported
                  require_pushed_authorization_requests:
                    type: boolean
                    example: true
                    description: If true, PAR (Pushed Authorisation Requests) are required. Required for FAPI 1.0 Advanced.
                  mtls_endpoint_aliases:
                    type: object
                    description: mTLS endpoint aliases for certificate-bound access tokens (RFC 8705)
                    properties:
                      token_endpoint:
                        type: string
                        example: https://api.kangopenbanking.com/v1/oauth/token
                      par_endpoint:
                        type: string
                        example: https://api.kangopenbanking.com/v1/oauth/par
                  pushed_authorization_request_endpoint:
                    type: string
                    format: uri
                    description: >-
                      URL of the Pushed Authorisation Request (PAR) endpoint (RFC 9126). Clients SHOULD use PAR before
                      calling the authorization endpoint.
                    example: https://api.kangopenbanking.com/v1/oauth/par
                  backchannel_authentication_endpoint:
                    type: string
                    format: uri
                    description: >-
                      URL of the CIBA (Client-Initiated Backchannel Authentication) endpoint for decoupled
                      authentication flows. Optional advanced FAPI feature for mobile banking step-up authentication.
                    example: https://api.kangopenbanking.com/v1/auth/backchannel
          headers:
            x-fapi-interaction-id:
              $ref: '#/components/headers/XFapiInteractionIdResponse'
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
            Cache-Control:
              $ref: '#/components/headers/CacheControl'
            ETag:
              $ref: '#/components/headers/ETag'
            X-Trace-Id:
              description: >-
                Distributed trace identifier for this request. Echoes the inbound X-Trace-Id or W3C traceparent when
                present; otherwise a server-generated UUID v4.
              schema:
                type: string
            traceparent:
              $ref: '#/components/headers/Traceparent'
            Content-Language:
              $ref: '#/components/headers/Content-Language'
        '429':
          $ref: '#/components/responses/TooManyRequests'
          headers:
            X-Trace-Id:
              description: >-
