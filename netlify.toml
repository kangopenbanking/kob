###########################################################################
# Netlify build & deploy configuration
#
# Auto-deploy: connect this repo in Netlify dashboard
#   (Site settings -> Build & deploy -> Continuous deployment).
#
# EXPECTED_OPENAPI_VERSION is NOT hardcoded here — it is read at build time
# from src/config/version.ts (the single source of truth) via
# `scripts/print-expected-version.mjs`.
#
# Optional Netlify environment variables for failure notifications:
#   SLACK_WEBHOOK_URL  — Slack incoming webhook; predeploy.mjs posts here on
#                        any pre-deploy failure.
###########################################################################

[build]
  command = "export EXPECTED_OPENAPI_VERSION=$(node scripts/print-expected-version.mjs) && npm run predeploy && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  AUDIT_BASE = "https://kangopenbanking.com"

# Production deploys (main branch)
[context.production]
  command = "export EXPECTED_OPENAPI_VERSION=$(node scripts/print-expected-version.mjs) && npm run predeploy && npm run build"

# Deploy previews (pull requests) — skip the live audit since the new
# version isn't deployed yet, only run the version-parity gate.
[context.deploy-preview]
  command = "export EXPECTED_OPENAPI_VERSION=$(node scripts/print-expected-version.mjs) && npm run predeploy:offline && npm run build"

# Branch deploys
[context.branch-deploy]
  command = "export EXPECTED_OPENAPI_VERSION=$(node scripts/print-expected-version.mjs) && npm run predeploy:offline && npm run build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
