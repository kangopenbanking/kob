name: Vercel production deploy (default)

# PERMANENT — Vercel is the default production deploy target.
# Triggers full prebuilt deploy to Vercel for kangopenbanking.com whenever
# version-bearing artifacts, developer-portal pages, or vercel.json change.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN       — Account/Team token (vercel.com/account/tokens)
#   VERCEL_ORG_ID      — Team/User ID  (from .vercel/project.json after `vercel link`)
#   VERCEL_PROJECT_ID  — Project ID    (from .vercel/project.json after `vercel link`)
#
# Optional:
#   VERCEL_PROD_URL    — Public URL to smoke-test post-deploy.
#                        Defaults to https://kangopenbanking.com
#
# Justification: ORDER P1 (Public First), ORDER P2 (Zero-404), ORDER P4
# (Open Spec), ORDER P10 (Living Docs). Verifies /developer and /openapi.*
# served correctly on every prod deploy.

on:
  push:
    branches: [main]
    paths:
      - 'src/config/version.ts'
      - 'public/openapi.json'
      - 'public/openapi.yaml'
      - 'public/openapi-sandbox.json'
      - 'public/openapi-sandbox.yaml'
      - 'public/changelog.json'
      - 'public/CHANGELOG.md'
      - 'public/postman/**'
      - 'src/**'
      - 'docs/developer-portal/**'
      - 'docs/public/**'
      - 'index.html'
      - 'vercel.json'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
  workflow_run:
    workflows: ['Auto-sync API version artifacts']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you triggering a manual prod deploy?'
        required: false
        default: 'Manual redeploy'

concurrency:
  group: vercel-prod-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      ${{ github.event_name != 'workflow_run'
          || github.event.workflow_run.conclusion == 'success' }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Guard — required secrets present
        id: guard
        run: |
          missing=0
          for v in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!v}" ]; then
              echo "::warning::$v secret is not configured."
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            {
              echo "### Vercel CLI deploy skipped"
              echo ""
              echo "VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID are not configured."
              echo "Vercel's native GitHub integration handles the production deploy automatically — this CLI fallback is optional."
              echo "To enable it, add the three secrets in Settings → Secrets and variables → Actions."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip != 'true'
      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: '22'
          cache: npm

      - name: Install Vercel CLI
        if: steps.guard.outputs.skip != 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel production env
        if: steps.guard.outputs.skip != 'true'
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build (production, prebuilt)
        if: steps.guard.outputs.skip != 'true'
        run: vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy prebuilt to Vercel production
        id: deploy
        if: steps.guard.outputs.skip != 'true'
        run: |
          URL=$(vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed: $URL"

      - name: Post-deploy smoke test (public routes)
        if: steps.guard.outputs.skip != 'true'
        env:
          BASE: ${{ secrets.VERCEL_PROD_URL || 'https://kangopenbanking.com' }}
        run: node scripts/vercel-postdeploy-smoke.mjs "$BASE"

      - name: Summary
        if: steps.guard.outputs.skip != 'true'
        run: |
          {
            echo "### Vercel production deploy"
            echo ""
            echo "- Deployment URL: ${{ steps.deploy.outputs.url }}"
            echo "- Commit: \`${GITHUB_SHA::7}\`"
            echo "- Smoke test: passed against \`${{ secrets.VERCEL_PROD_URL || 'https://kangopenbanking.com' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
