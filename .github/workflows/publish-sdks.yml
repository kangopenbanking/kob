# ============================================================
# SDK Auto-Publish Pipeline
# Triggers on version tags: sdk-v*
# Publishes Node.js (npm), Python (PyPI), PHP (Packagist)
# ============================================================

name: Publish SDKs

on:
  push:
    tags:
      - 'sdk-v*'

permissions:
  contents: write

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install build twine
      - run: python -m build
      - run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  publish-packagist:
    name: Create GitHub Release (triggers Packagist)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/sdk-v}" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SDK v${{ steps.version.outputs.VERSION }}"
          body: "SDK release v${{ steps.version.outputs.VERSION }} — npm, PyPI, and Packagist packages published."
          generate_release_notes: true
