name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - '.github/workflows/worker-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target (production | sandbox)'
        required: false
        default: 'production'

jobs:
  deploy:
    name: wrangler deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: worker/package.json

      - name: Install worker deps
        run: npm install --no-audit --no-fund

      - name: Guard — ensure CLOUDFLARE_API_TOKEN is set
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "${CF_TOKEN:-}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN repo secret is missing. Add it under Settings → Secrets → Actions."
            exit 1
          fi

      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          ENV_INPUT="${{ github.event.inputs.environment }}"
          ENV_INPUT="${ENV_INPUT:-production}"
          chmod +x ./scripts/redeploy.sh ./scripts/verify-deploy.sh
          ./scripts/redeploy.sh "$ENV_INPUT"
