###############################################################################
# Developer Portal CI Smoke Tests
#
# Runs on:
#   - every push to main (after Netlify auto-builds, smokes production)
#   - every pull request (parity gate only — site not yet deployed)
#   - manual dispatch
#
# Steps:
#   1) Version-parity check (offline)
#   2) Public-access audit against the chosen base URL
#   3) Vitest portal smoke suite (route 200s, unique titles, Swagger UI mount,
#      status badge, version parity between openapi.json and changelog.json)
###############################################################################
name: developer-portal-smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to smoke (defaults to https://kangopenbanking.com)'
        required: false
        default: 'https://kangopenbanking.com'

concurrency:
  group: portal-smoke-${{ github.ref }}
  cancel-in-progress: true

env:
  EXPECTED_OPENAPI_VERSION: '4.28.2'
  AUDIT_BASE: ${{ github.event.inputs.base_url || 'https://kangopenbanking.com' }}

jobs:
  parity:
    name: Version parity (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node_version: '20'
      - run: npm ci --no-audit --no-fund
      - name: Version-parity gate
        run: npm run openapi:check-version

  smoke:
    name: Live smoke + audit (${{ env.AUDIT_BASE }})
    needs: parity
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node_version: '20'
      - run: npm ci --no-audit --no-fund

      - name: Wait for Netlify deploy to finish
        run: |
          echo "Waiting 90s for Netlify to build & promote the latest commit..."
          sleep 90

      - name: Public-access audit
        run: npm run audit:public
        env:
          AUDIT_BASE: ${{ env.AUDIT_BASE }}
          EXPECTED_OPENAPI_VERSION: ${{ env.EXPECTED_OPENAPI_VERSION }}

      - name: Vitest portal smoke suite
        run: npm run smoke:portal
        env:
          SMOKE_BASE_URL: ${{ env.AUDIT_BASE }}
