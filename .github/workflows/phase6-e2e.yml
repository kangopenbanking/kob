name: Phase 6 — E2E Tests (CI gate)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  e2e:
    name: Phase 6 E2E suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Phase 6 ingestion + lifecycle + outbound + contract suites
        run: bunx vitest run \
          src/test/phase6-provider-webhook-ingestion.test.ts \
          src/test/phase6-merchant-lifecycle.test.ts \
          src/test/phase6-merchant-outbound-webhooks.test.ts \
          src/test/phase6-contract.test.ts \
          src/test/phase6-dashboard-routes.test.tsx

      - name: Run companion OpenAPI ratchet tests
        run: bunx vitest run \
          src/test/openapi-2xx-schema-coverage.test.ts \
          src/test/openapi-operation-id-uniqueness.test.ts \
          src/test/openapi-security-declared.test.ts \
          src/test/openapi-pagination-coverage.test.ts \
          src/test/openapi-error-catalog-coverage.test.ts \
          src/test/openapi-idempotency-coverage.test.ts
