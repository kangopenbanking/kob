name: Developer Portal Uptime

# Probes the public developer portal + OpenAPI endpoints every 15 minutes.
# Asserts each URL returns HTTP 200 and contains no regression markers
# (`YOUR_PROJECT`, internal `supabase.co/functions/v1` host, or a visible
# `<div id="ssr-fallback"` injection).
#
# On failure: opens (or updates) a GitHub issue tagged `portal-down`, which
# routes to the repository's existing notification channels.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe portal + spec endpoints
        id: probe
        shell: bash
        run: |
          set +e
          BASE="https://kangopenbanking.com"
          URLS=(
            "/developer"
            "/developer/getting-started"
            "/developer/api-explorer"
            "/developer/gateway/quickstart"
            "/developer/sandbox/overview"
            "/developer/guides/sdks"
            "/developer/examples/real-world"
            "/developer/changelog"
            "/openapi.json"
            "/openapi.yaml"
            "/.well-known/openid-configuration"
          )
          FAIL=0
          REPORT=""
          for path in "${URLS[@]}"; do
            url="${BASE}${path}"
            tmp=$(mktemp)
            status=$(curl -sS -o "$tmp" -w "%{http_code}" --max-time 20 -L "$url" || echo "000")
            body=$(cat "$tmp"); rm -f "$tmp"
            line="OK   ${status}  ${path}"
            if [ "$status" != "200" ]; then
              line="FAIL ${status}  ${path}  (expected 200)"
              FAIL=1
            elif echo "$body" | grep -q "YOUR_PROJECT"; then
              line="FAIL ${status}  ${path}  (leak: YOUR_PROJECT)"
              FAIL=1
            elif echo "$body" | grep -q "supabase\.co/functions/v1"; then
              line="FAIL ${status}  ${path}  (leak: internal supabase host)"
              FAIL=1
            elif echo "$body" | grep -q '<div id="ssr-fallback"'; then
              line="FAIL ${status}  ${path}  (duplicate-content ssr-fallback div)"
              FAIL=1
            fi
            echo "$line"
            REPORT="${REPORT}${line}
"
          done
          {
            echo "report<<__EOF__"
            echo "$REPORT"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"
          exit $FAIL

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.probe.outputs.report }}`;
            const title = 'Developer portal uptime probe failed';
            const body = [
              '`developer-portal-uptime` workflow detected one or more failing URLs.',
              '',
              '```',
              report,
              '```',
              '',
              'Workflow run: ' +
                `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'portal-down',
              per_page: 5,
            });
            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['portal-down', 'priority:high'],
              });
            }
