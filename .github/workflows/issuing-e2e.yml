name: Issuing E2E (Kora)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "supabase/functions/virtual-cards-v2/**"
      - "supabase/functions/kora-webhook/**"
      - "supabase/functions/_shared/kora-client.ts"
      - "src/pages/issuing/**"
      - "scripts/kora-preflight.mjs"

jobs:
  preflight:
    runs-on: ubuntu-latest
    env:
      KORA_SECRET_KEY: ${{ secrets.KORA_SECRET_KEY }}
      KORA_PUBLIC_KEY: ${{ secrets.KORA_PUBLIC_KEY }}
      KORA_WEBHOOK_SECRET: ${{ secrets.KORA_WEBHOOK_SECRET }}
      KORA_BASE_URL: ${{ secrets.KORA_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run Kora preflight
        run: node scripts/kora-preflight.mjs

  unit-tests:
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - run: bun install --frozen-lockfile
      - name: Run vitest issuing tests
        run: bunx vitest run src/test/issuing
