# Phase 1B R1I-d.2A Isolated Verification (R1I-d.2A-CI4 corrections)
# CI5 canonical clean-reset reproducibility repair
# CI6 pg_cron extension schema reproducibility repair
# CI7 realtime publication idempotency sweep
# CI7A strict realtime publication guard enforcement
# CI8 translation child-data FK reproducibility sweep
# CI9 pg_cron and pg_net extension reproducibility sweep
# CI9A generated extension audit evidence provenance repair
# CI10 local Supabase postgres database guard attestation
# CI10A IPv6 loopback hostname normalisation
# CI11 auth-parented representative fixture
# CI12 ephemeral Edge Runtime cursor-secret propagation
# CI12A cross-step temporary environment cleanup accounting
# CI12B partial-preparation temporary secret-file cleanup



#
# Boots a fully DISPOSABLE local Supabase stack via Docker inside the GitHub
# Actions runner. No Lovable-managed Supabase project is contacted; no
# production credentials are used. See docs/audits/phase-1/phase-1b-r1i-d2a-
# ci4-startup-repair.md for the CI4 repair rationale and
# docs/audits/phase-1/phase-1b-r1i-d2a-ci5-canonical-reset-repair.md for CI5.

name: Phase 1B R1I-d.2A Isolated Verification

# CI3A one-time execution trigger
on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - ".github/workflows/phase1b-r1i-d2a-verification.yml"
  pull_request:
    paths:
      - "scripts/phase1b-d2a/**"
      - "scripts/slice-d2a-online-index-harness.mjs"
      - "supabase/pending-migrations/phase-1/20260401000000_phase-1b-r1i-d2a-gateway-pagination-indexes*.sql"
      - "supabase/pending-operations/phase-1/20260401000000_phase-1b-r1i-d2a-gateway-pagination-indexes*.sql"
      - "supabase/functions/gateway-query/**"
      - ".github/workflows/phase1b-r1i-d2a-verification.yml"
      - "src/test/phase1b-d2a-*.test.ts"

permissions:
  contents: read

concurrency:
  group: phase1b-r1i-d2a-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: R1I-d.2A EV (isolated, local Supabase stack)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      KOB_D2A_DISPOSABLE_ENVIRONMENT: "true"
      D2A_LOCAL_SUPABASE_STACK: "true"
      D2A_HARNESS_PGURL: ""
      D2A_RUNTIME_BASE_URL: "http://127.0.0.1:54321/functions/v1/gateway-query"


    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean generated CI evidence
        run: |
          set -euo pipefail
          rm -f \
            extension-reproducibility-audit.json \
            extension-reproducibility-audit.log \
            realtime-publication-audit.json \
            realtime-publication-audit.log \
            edge-runtime-env-attestation.json
          rm -f "${RUNNER_TEMP:-/tmp}/kob-d2a-edge-runtime.env"



      - name: Node (pinned via .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Set up Supabase CLI (pinned)
        uses: supabase/setup-cli@v2
        with:
          version: "2.101.0"
          github-token: ${{ github.token }}

      - name: Record tool versions
        run: |
          set -o pipefail
          {
            echo "{"
            echo "  \"node\": \"$(node -v)\","
            echo "  \"npm\": \"$(npm -v)\","
            echo "  \"supabase\": \"$(supabase --version)\","
            echo "  \"supabasePinned\": \"2.101.0\","
            echo "  \"psql\": \"$(psql --version)\""
            echo "}"
          } > tool-versions.json
          cat tool-versions.json

      - name: Mint ephemeral test cursor secret
        run: |
          echo "KOB_CURSOR_HMAC_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"

      - name: Install dependencies (clean)
        run: npm ci

      - name: Verify PostgreSQL driver
        run: node -e "import('pg').then(() => console.log('pg import PASS'))"

      - name: Docker and Supabase startup preflight
        run: |
          set -euo pipefail

          docker version
          docker info
          docker system df
          free -h
          df -h
          supabase --version

          test -f supabase/config.toml

          node -e "
            const fs = require('fs');
            const path = 'supabase/config.toml';
            if (!fs.existsSync(path)) {
              console.error('Missing supabase/config.toml');
              process.exit(1);
            }
            console.log('supabase/config.toml present');
          "

      - name: Start isolated local Supabase stack
        run: |
          set -o pipefail

          START_EXIT=0

          supabase start \
            --exclude realtime,storage-api,imgproxy,mailpit,postgres-meta,studio,logflare,vector,supavisor \
            2>&1 | tee supabase-start.log || START_EXIT=$?

          if [ "$START_EXIT" -ne 0 ]; then
            echo "Supabase startup failed with exit code $START_EXIT"

            docker ps -a > docker-ps-after-start.txt 2>&1 || true
            docker system df > docker-system-df-after-start.txt 2>&1 || true
            supabase status > supabase-status-after-start.txt 2>&1 || true

            mkdir -p supabase-container-logs

            docker ps -a \
              --format '{{.Names}}' \
              | grep -E '^supabase_|supabase' \
              | while read -r container; do
                  docker logs "$container" \
                    > "supabase-container-logs/${container}.log" \
                    2>&1 || true
                done

            exit "$START_EXIT"
          fi

          supabase status

      - name: Populate isolated environment variables
        run: |
          set -o pipefail
          supabase status -o env > .d2a.env
          . ./.d2a.env
          {
            echo "SUPABASE_URL=${API_URL}"
            echo "SUPABASE_ANON_KEY=${ANON_KEY}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}"
            echo "D2A_HARNESS_PGURL=${DB_URL}"
          } >> "$GITHUB_ENV"
          node -e "
            const u = new URL(process.argv[1]);
            const api = new URL(process.env.SUPABASE_URL || 'http://127.0.0.1:54321');
            const fs = require('fs');
            fs.writeFileSync('environment-preflight.json', JSON.stringify({
              host: u.hostname, port: u.port, database: u.pathname.slice(1),
              apiHost: api.hostname, apiPort: api.port,
              disposableMarker: process.env.KOB_D2A_DISPOSABLE_ENVIRONMENT === 'true',
              localSupabaseMarker: process.env.D2A_LOCAL_SUPABASE_STACK === 'true',
              secretPresent: !!process.env.KOB_CURSOR_HMAC_SECRET
            }, null, 2));
          " "${DB_URL}"
          cat environment-preflight.json
          # CI12A — mark base env file as prepared only after successful creation
          test -s .d2a.env
          echo "D2A_BASE_ENV_PREPARED=true" >> "$GITHUB_ENV"

      - name: Environment guard (fail-closed)
        run: |
          set -euo pipefail
          rm -f environment-guard.log
          node scripts/phase1b-d2a/guard.mjs \
            2>&1 | tee environment-guard.log
          test -s environment-guard.log


      - name: Bootstrap disposable environment (privilege probes)
        env:
          D2A_INFRA_HOSTED_POSTGRES: "true"
        run: node scripts/phase1b-d2a/bootstrap.mjs

      - name: Canonical reset 1 (supabase db reset --local --no-seed)
        run: |
          set -o pipefail
          supabase db reset --local --no-seed 2>&1 | tee canonical-reset-1.log

      - name: Snapshot canonical schema hash (after reset 1)
        run: |
          psql "$D2A_HARNESS_PGURL" -Atqc "
            SELECT md5(string_agg(table_schema||'.'||table_name||'.'||column_name||':'||data_type,',' ORDER BY table_schema,table_name,column_name))
              FROM information_schema.columns
             WHERE table_schema NOT IN ('pg_catalog','information_schema');
          " > schema-hash-1.txt
          psql "$D2A_HARNESS_PGURL" -Atqc "
            SELECT md5(string_agg(schemaname||'.'||indexname||':'||indexdef,',' ORDER BY schemaname,indexname))
              FROM pg_indexes WHERE schemaname NOT IN ('pg_catalog','information_schema');
          " > index-hash-1.txt

      - name: Canonical reset 2 (independent, from clean state)
        run: |
          set -o pipefail
          supabase db reset --local --no-seed 2>&1 | tee canonical-reset-2.log

      - name: Snapshot canonical schema hash (after reset 2) + parity
        run: |
          psql "$D2A_HARNESS_PGURL" -Atqc "
            SELECT md5(string_agg(table_schema||'.'||table_name||'.'||column_name||':'||data_type,',' ORDER BY table_schema,table_name,column_name))
              FROM information_schema.columns
             WHERE table_schema NOT IN ('pg_catalog','information_schema');
          " > schema-hash-2.txt
          psql "$D2A_HARNESS_PGURL" -Atqc "
            SELECT md5(string_agg(schemaname||'.'||indexname||':'||indexdef,',' ORDER BY schemaname,indexname))
              FROM pg_indexes WHERE schemaname NOT IN ('pg_catalog','information_schema');
          " > index-hash-2.txt
          node -e "
            const fs=require('fs');
            const s1=fs.readFileSync('schema-hash-1.txt','utf8').trim();
            const s2=fs.readFileSync('schema-hash-2.txt','utf8').trim();
            const i1=fs.readFileSync('index-hash-1.txt','utf8').trim();
            const i2=fs.readFileSync('index-hash-2.txt','utf8').trim();
            fs.writeFileSync('schema-hashes.json',JSON.stringify({reset1:s1,reset2:s2,identical:s1===s2},null,2));
            fs.writeFileSync('index-hashes.json',JSON.stringify({reset1:i1,reset2:i2,identical:i1===i2},null,2));
            if(s1!==s2||i1!==i2){console.error('canonical reset parity failed');process.exit(1);}
          "

      - name: Apply pending Phase 1 chain (psql, ON_ERROR_STOP=1)
        run: |
          set -o pipefail
          for f in \
            supabase/pending-migrations/phase-1/20260101000000_phase-1b-budgeting-additive.sql \
            supabase/pending-migrations/phase-1/20260201000000_phase-1b-r1i-c3d-roundup-eligibility-trigger.sql \
            supabase/pending-migrations/phase-1/20260301000000_phase-1b-r1i-c3h-goal-archive-provenance.sql \
            supabase/pending-migrations/phase-1/20260401000000_phase-1b-r1i-d2a-gateway-pagination-indexes.sql; do
            echo "Applying $f"
            psql "$D2A_HARNESS_PGURL" -v ON_ERROR_STOP=1 -f "$f" 2>&1 | tee -a pending-migration-results.log
          done

      - name: Online concurrent-index harness (autocommit, comment-safe parser)
        run: |
          set -o pipefail
          node scripts/slice-d2a-online-index-harness.mjs 2>&1 | tee online-index-results.log

      - name: Structural index definition parity (canonical vs concurrent)
        run: |
          set -o pipefail
          node scripts/phase1b-d2a/index-definition-parity.mjs 2>&1 | tee index-definition-parity.log

      - name: Representative fixture (parents-first, per-table builders, required-column preflight)
        run: |
          set -o pipefail
          node scripts/phase1b-d2a/fixture.mjs 2>&1 | tee fixture-loader.log

      - name: Query-plan capture — BEFORE index build
        run: |
          for idx in idx_gw_subaccounts_merchant_created_id_desc \
                     idx_gw_beneficiaries_merchant_created_id_desc \
                     idx_gw_payment_links_merchant_created_id_desc \
                     idx_gw_virtual_accounts_merchant_created_id_desc; do
            psql "$D2A_HARNESS_PGURL" -v ON_ERROR_STOP=1 -c "DROP INDEX IF EXISTS public.$idx;"
          done
          node scripts/phase1b-d2a/query-plans.mjs before

      - name: Rebuild indexes via online harness
        run: |
          set -o pipefail
          node scripts/slice-d2a-online-index-harness.mjs 2>&1 | tee -a online-index-results.log

      - name: Query-plan capture — AFTER index build
        run: node scripts/phase1b-d2a/query-plans.mjs after

      - name: Prepare ephemeral Edge Function environment
        run: |
          set -euo pipefail
          test -n "${KOB_CURSOR_HMAC_SECRET:-}"
          FUNCTION_ENV_FILE="$RUNNER_TEMP/kob-d2a-edge-runtime.env"
          rm -f "$FUNCTION_ENV_FILE"
          umask 077
          printf 'KOB_CURSOR_HMAC_SECRET=%s\n' \
            "$KOB_CURSOR_HMAC_SECRET" > "$FUNCTION_ENV_FILE"
          chmod 600 "$FUNCTION_ENV_FILE"
          test -s "$FUNCTION_ENV_FILE"
          test "$(wc -l < "$FUNCTION_ENV_FILE" | tr -d ' ')" = "1"
          test "$(grep -c '^KOB_CURSOR_HMAC_SECRET=' "$FUNCTION_ENV_FILE")" = "1"
          test "$(stat -c '%a' "$FUNCTION_ENV_FILE")" = "600"
          echo "D2A_FUNCTION_ENV_FILE=$FUNCTION_ENV_FILE" >> "$GITHUB_ENV"
          node -e "
            const fs = require('fs');
            const p = process.env.RUNNER_TEMP + '/kob-d2a-edge-runtime.env';
            const mode = (fs.statSync(p).mode & 0o777).toString(8);
            const text = fs.readFileSync(p, 'utf8');
            const lines = text.split(/\r?\n/).filter(Boolean);
            fs.writeFileSync(
              'edge-runtime-env-attestation.json',
              JSON.stringify({
                currentRunFilePresent: true,
                permissions: mode,
                lineCount: lines.length,
                cursorSecretKeyPresent:
                  lines.some(line => line.startsWith('KOB_CURSOR_HMAC_SECRET=')),
                cursorSecretValueRecorded: false
              }, null, 2)
            );
          "
          test -s edge-runtime-env-attestation.json
          # CI12A — mark function env file as prepared only after successful creation + attestation
          echo "D2A_FUNCTION_ENV_PREPARED=true" >> "$GITHUB_ENV"

      - name: Serve gateway-query Edge Function (background, single instance)
        run: |
          nohup supabase functions serve gateway-query --no-verify-jwt \
            --env-file "$D2A_FUNCTION_ENV_FILE" \
            > runtime-serve.log 2>&1 &
          echo $! > runtime-serve.pid
          for i in {1..60}; do
            curl -fsS "$D2A_RUNTIME_BASE_URL?action=list-subaccounts&limit=1" >/dev/null 2>&1 && break
            sleep 1
          done

      - name: Runtime harness (unmasked; four canonical operations + security + CORS)
        run: |
          set -o pipefail
          node scripts/phase1b-d2a/runtime-tests.mjs 2>&1 | tee runtime-results.log

      - name: Stop Edge Function server
        if: always()
        run: |
          set -euo pipefail
          # Preserve owned runtime-process shutdown
          if [ -f runtime-serve.pid ]; then kill "$(cat runtime-serve.pid)" || true; fi
          # CI12A — fail-closed accounting for function-env removal in stop step
          FUNCTION_ENV_REMOVED_BY_STOP=0
          if [ -n "${D2A_FUNCTION_ENV_FILE:-}" ] && \
             [ -e "$D2A_FUNCTION_ENV_FILE" ]; then
            rm -f "$D2A_FUNCTION_ENV_FILE"
            test ! -e "$D2A_FUNCTION_ENV_FILE"
            FUNCTION_ENV_REMOVED_BY_STOP=1
          fi
          echo \
            "D2A_FUNCTION_ENV_REMOVED_BY_STOP=$FUNCTION_ENV_REMOVED_BY_STOP" \
            >> "$GITHUB_ENV"

      - name: Realtime publication audit (CI7A)
        run: |
          set -euo pipefail
          rm -f realtime-publication-audit.json realtime-publication-audit.log
          node scripts/phase1b-d2a/audit-realtime-publications.mjs \
            2>&1 | tee realtime-publication-audit.log
          test -s realtime-publication-audit.json
          test -s realtime-publication-audit.log

      - name: Extension reproducibility audit (CI9)
        run: |
          set -euo pipefail
          rm -f extension-reproducibility-audit.json extension-reproducibility-audit.log
          node scripts/phase1b-d2a/audit-extension-reproducibility.mjs \
            2>&1 | tee extension-reproducibility-audit.log
          test -s extension-reproducibility-audit.json
          test -s extension-reproducibility-audit.log

      - name: Static infrastructure suite (guard + CI2 + CI3/CI4 + CI5 + CI6 + CI7 + CI8 + CI9 + CI10 + CI11 + CI12)
        run: |
          npx vitest run \
            src/test/phase1b-d2a-infra-guard.test.ts \
            src/test/phase1b-d2a-ci2-repair.test.ts \
            src/test/phase1b-d2a-ci3-enforcement.test.ts \
            src/test/phase1b-d2a-ci5-migration-reproducibility.test.ts \
            src/test/phase1b-d2a-ci6-extension-reproducibility.test.ts \
            src/test/phase1b-d2a-ci7-realtime-publication-reproducibility.test.ts \
            src/test/phase1b-d2a-ci8-translation-fk-reproducibility.test.ts \
            src/test/phase1b-d2a-ci9-extension-sweep-reproducibility.test.ts \
            src/test/phase1b-d2a-ci10-local-supabase-guard-reproducibility.test.ts \
            src/test/phase1b-d2a-ci11-auth-parent-fixture-reproducibility.test.ts \
            src/test/phase1b-d2a-ci12-edge-runtime-secret-propagation.test.ts \
            --reporter=json --outputFile=targeted-suite-results.json



      - name: d.2A contract suite
        run: npx vitest run src/test/pagination-gateway-d2a-contract.test.ts

      - name: OpenAPI gates (spec-side vitest)
        run: |
          set -o pipefail
          npm run openapi:gates:test 2>&1 | tee -a gate-results.log

      - name: OpenAPI gates (structural + performance)
        run: |
          set -o pipefail
          npm run openapi:gates 2>&1 | tee -a gate-results.log

      - name: OpenAPI version check
        run: |
          set -o pipefail
          npm run openapi:check-version 2>&1 | tee -a gate-results.log

      - name: Version sync check
        run: |
          set -o pipefail
          npm run version:check-sync 2>&1 | tee -a gate-results.log

      - name: Print expected version
        run: |
          set -o pipefail
          npm run version:print 2>&1 | tee -a gate-results.log

      - name: Full lint (strict, controlled ceiling ≤5586)
        run: |
          set +e
          npx eslint . -f json -o lint-results.json
          set -e
          node -e "
            const r=require('./lint-results.json');
            const total=r.reduce((a,f)=>a+f.errorCount+f.warningCount,0);
            console.log('lint findings:', total);
            if(total>5586){console.error('lint ceiling exceeded');process.exit(1);}
          "

      - name: Full repository suite — run 1
        run: npx vitest run --reporter=json --outputFile=full-suite-run-1.json
        continue-on-error: true

      - name: Full repository suite — run 2
        run: npx vitest run --reporter=json --outputFile=full-suite-run-2.json
        continue-on-error: true

      - name: Full repository suite — run 3
        run: npx vitest run --reporter=json --outputFile=full-suite-run-3.json
        continue-on-error: true

      - name: Full-suite policy evaluator (raw ≤93, stable ≤89, missing = fail)
        run: node scripts/phase1b-d2a/full-suite-policy.mjs

      - name: Build
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build-results.log

      - name: Teardown (always) — fail-closed local Supabase stack shutdown
        if: always()
        run: |
          set -o pipefail
          node scripts/phase1b-d2a/teardown.mjs 2>&1 | tee teardown-results.log

      - name: Upload full evidence bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase1b-r1i-d2a-evidence
          if-no-files-found: ignore
          path: |
            realtime-publication-audit.json
            realtime-publication-audit.log
            extension-reproducibility-audit.json
            extension-reproducibility-audit.log

            tool-versions.json
            environment-preflight.json
            environment-guard.log
            edge-runtime-env-attestation.json

            supabase-start.log
            docker-ps-after-start.txt
            docker-system-df-after-start.txt
            supabase-status-after-start.txt
            supabase-container-logs/**
            canonical-reset-1.log
            canonical-reset-2.log
            schema-hashes.json
            index-hashes.json
            pending-migration-results.log
            online-index-results.log
            index-definition-parity.json
            index-definition-parity.log
            fixture-summary.json
            fixture-loader.log
            query-plans-before.jsonl
            query-plans-after.jsonl
            query-plan-summary.json
            runtime-results.json
            runtime-results.log
            runtime-serve.log
            pagination-header-results.json
            cursor-security-results.json
            database-call-evidence.json
            targeted-suite-results.json
            full-suite-run-1.json
            full-suite-run-2.json
            full-suite-run-3.json
            full-suite-policy-results.json
            lint-results.json
            gate-results.log
            build-results.log
            teardown-results.log
            teardown-results.json
          retention-days: 14
