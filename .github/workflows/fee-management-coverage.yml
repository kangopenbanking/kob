name: Fee Management Coverage

on:
  push:
    branches: [main]
  pull_request:

jobs:
  coverage-ratchet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Fee structures coverage ratchet
        run: bunx vitest run src/test/fee-management-coverage.test.ts
