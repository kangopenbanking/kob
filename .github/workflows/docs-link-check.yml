# Developer & info portal link health — fails build on any 404 or
# redirect-to-homepage from documented public routes.
# Standing Order P2 (Zero-404 Rule).
name: docs-link-check

on:
  pull_request:
    paths:
      - 'src/pages/developer/**'
      - 'src/pages/info/**'
      - 'src/App.tsx'
      - 'public/openapi*.json'
      - 'public/openapi*.yaml'
      - '.github/workflows/docs-link-check.yml'
      - 'scripts/check-docs-links.mjs'
  push:
    branches: [main]
  schedule:
    - cron: '17 6 * * *'   # daily 06:17 UTC
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-22.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - name: Run link checker
        env:
          DOCS_BASE_URL: ${{ vars.DOCS_BASE_URL || 'https://kangopenbanking.com' }}
        run: node scripts/check-docs-links.mjs
