#:schema https://json.schemastore.org/wrangler.json
# ----------------------------------------------------------------------------
# Kang Open Banking — API Gateway Worker
# Deployed at: https://api.kangopenbanking.com/*
# Origin:      https://wdzkzeahdtxlynetndqw.supabase.co/functions/v1/*
# ----------------------------------------------------------------------------

name = "kob-api-gateway"
main = "src/index.ts"
compatibility_date = "2026-04-24"
compatibility_flags = ["nodejs_compat"]

# Custom domain — Cloudflare provisions and renews the cert automatically
# once the zone (kangopenbanking.com) is added to your Cloudflare account.
[[routes]]
pattern = "api.kangopenbanking.com/*"
custom_domain = true

[vars]
ORIGIN_BASE = "https://wdzkzeahdtxlynetndqw.supabase.co"
GATEWAY_VERSION = "1.0.0"

# Secrets — set with `wrangler secret put <NAME>`:
#   GATEWAY_SHARED_SECRET     Optional. Marks traffic as coming through the gateway.
#   SUPABASE_SERVICE_ROLE_KEY Required for API-key validation against api_clients.

# KV namespace caching validated API keys (5-min TTL). Create with:
#   wrangler kv:namespace create API_KEY_CACHE
# Then paste the returned id below and uncomment.
# [[kv_namespaces]]
# binding = "API_KEY_CACHE"
# id      = "REPLACE_WITH_KV_NAMESPACE_ID"

[observability]
enabled = true

# Per-route limits — protects the Supabase backend from abuse.
[limits]
cpu_ms = 50
